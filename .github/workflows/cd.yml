name: CD

on:
  push:
    branches:
      - main
      - test-cd

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── main / test-cd: heavy builds first; semantic-release + uploads run only after success ──
  release-build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test-cd'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build embedded Linux guest-agent
        if: matrix.goos == 'linux' || matrix.goos == 'darwin'
        working-directory: packages/nexus/cmd/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          rm -f "agent-linux-${{ matrix.goarch }}"
          go build -trimpath -ldflags='-s -w' \
            -o "agent-linux-${{ matrix.goarch }}" \
            ../nexus-guest-agent/

      - name: Stage Linux amd64 libkrun embeds
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: bash scripts/ci/stage-nexus-linux-embeds.sh

      # go:embed libkrun-darwin-arm64.dylib (Apple Silicon daemon only).
      - name: Stage libkrun dylibs for macOS embed
        if: matrix.goos == 'darwin'
        run: bash scripts/local/build-libkrun-darwin.sh

      - name: Build nexus binary
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          outfile="nexus-${{ matrix.goos }}-${{ matrix.goarch }}"
          rm -f "$outfile"
          go build -trimpath -ldflags="-s -w" -o "$outfile" ./cmd/nexus

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/nexus/nexus-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release-host-rootfs:
    name: Pre-bake libkrun host rootfs (linux/amd64)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test-cd'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: "true"
      GOTOOLCHAIN: local
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
      NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "128"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "128"
      NEXUS_LIBKRUN_MEM_MIB: "256"
      NEXUS_PASST_PATH: /tmp/passt-patched
      NEXUS_RELEASE_ROOTFS_BAKE_TIMEOUT: "55m"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Enable KVM access
        run: scripts/ci/enable-kvm.sh

      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Set up XFS reflink volume for libkrun workspaces
        run: scripts/ci/setup-xfs-reflink.sh

      - name: Prepare libkrun bake cache paths
        run: scripts/ci/prepare-libkrun-cache-env.sh

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v6-${{ runner.os }}-${{ hashFiles('Nexusfile', 'schemas/nexusfile.schema.json', 'packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/internal/infra/runtime/libkrun/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**', 'packages/nexus/cmd/nexus/nexus-libkrun-vm', 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go') }}
          restore-keys: |
            libkrun-baked-v6-${{ runner.os }}-

      - name: Hydrate cached VM assets to host paths
        timeout-minutes: 25
        env:
          STEP_TIMEOUT_SECONDS: "1200"
        run: scripts/ci/hydrate-libkrun-cache.sh

      - name: Verify pre-baked VM assets (cache hint)
        run: scripts/ci/verify-vm-assets.sh hint

      - name: Build embedded guest-agent + libkrun nexus (Linux CI)
        timeout-minutes: 10
        run: scripts/ci/build-nexus-libkrun.sh

      - name: Build patched passt for bake VM networking
        timeout-minutes: 10
        run: bash scripts/ci/build-passt.sh

      - name: Provision libkrun host (kernel + base rootfs)
        timeout-minutes: 10
        run: scripts/ci/provision-libkrun-host.sh

      - name: Verify VM assets after provisioning
        run: scripts/ci/verify-vm-assets.sh required

      - name: Pre-bake tools into host rootfs and compress
        timeout-minutes: 65
        env:
          NEXUS_PASST_PATH: /tmp/passt-patched
        run: bash scripts/ci/build-release-host-rootfs-bake-and-package.sh

      - name: Upload host rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-linux-amd64-host
          path: dist/rootfs-linux-amd64.ext4.gz
          if-no-files-found: error

  release-darwin-guest-rootfs:
    name: macOS guest rootfs (linux/arm64 image for libkrun)
    # TODO: re-enable when macVM VmCreate on GHA is stable
    if: false
    runs-on: macos-14
    timeout-minutes: 120
    env:
      NEXUS_LIBKRUN_BAKE_TIMEOUT: 55m
      NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "3"
      NEXUS_LIBKRUN_MEM_MIB: "3072"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build + bake guest rootfs (macOS Hypervisor)
        run: bash scripts/ci/build-release-darwin-arm64-guest-rootfs.sh

      - name: Upload darwin guest rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-darwin-arm64-guest
          path: dist/rootfs-darwin-arm64.ext4.gz
          if-no-files-found: error

  release-publish:
    name: Semantic release & publish artifacts
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test-cd'
    needs: [release-build, release-host-rootfs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist

      - name: Download host rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-linux-amd64-host
          path: dist

      # Darwin guest rootfs is optional — baked in release-darwin-guest-rootfs (currently disabled).

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          latest_tag_before=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          pnpm exec semantic-release --json > /tmp/sr-result.json 2> /tmp/sr-log.txt
          cat /tmp/sr-log.txt

          latest_tag_after=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          version=""
          if [ -f /tmp/sr-result.json ] && [ -s /tmp/sr-result.json ]; then
            if command -v jq &> /dev/null; then
              version=$(jq -r '.nextRelease.version // empty' /tmp/sr-result.json 2>/dev/null || true)
            fi
            if [ -z "$version" ]; then
              version=$(grep -o '"version":"[^"]*"' /tmp/sr-result.json | head -1 | cut -d'"' -f4 || true)
            fi
          fi

          if [ -z "$version" ] && [ "$latest_tag_before" != "$latest_tag_after" ] && [ -n "$latest_tag_after" ]; then
            version=$(echo "$latest_tag_after" | sed 's/^v//')
          fi

          if [ -n "$version" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare checksums and latest.json
        if: steps.semantic.outputs.released == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.semantic.outputs.tag }}
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          bins=(nexus-*)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no nexus-* binaries in dist/"
            ls -la
            exit 1
          fi
          extra=()
          [ -f rootfs-linux-amd64.ext4.gz ] && extra+=(rootfs-linux-amd64.ext4.gz)
          [ -f rootfs-darwin-arm64.ext4.gz ] && extra+=(rootfs-darwin-arm64.ext4.gz)
          sha256sum nexus-* "${extra[@]}" > checksums.txt

          VERSION="${RELEASE_TAG}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"

          hash_for() {
            local f="$1"
            grep -F " ${f}" checksums.txt | awk '{print $1}'
          }

          ROOTFS_SHA=""
          if [ -f rootfs-linux-amd64.ext4.gz ]; then
            ROOTFS_SHA="$(hash_for rootfs-linux-amd64.ext4.gz)"
          fi

          ROOTFS_DARWIN_SHA=""
          if [ -f rootfs-darwin-arm64.ext4.gz ]; then
            ROOTFS_DARWIN_SHA="$(hash_for rootfs-darwin-arm64.ext4.gz)"
          fi

          jq -n \
            --arg ver "${VERSION}" \
            --arg pub "${PUB_DATE}" \
            --arg b "${BASE_URL}" \
            --arg h_la "$(hash_for nexus-linux-amd64)" \
            --arg h_darm "$(hash_for nexus-darwin-arm64)" \
            --arg h_rf "${ROOTFS_SHA}" \
            --arg h_rfd "${ROOTFS_DARWIN_SHA}" \
            '
            {
              version: $ver,
              pub_date: $pub,
              platforms: {
                "linux-amd64": { url: ($b + "/nexus-linux-amd64"), sha256: $h_la },
                "darwin-arm64": { url: ($b + "/nexus-darwin-arm64"), sha256: $h_darm }
              }
            }
            | if ($h_rf | length) > 0 then . + {
                rootfs_linux_amd64: {
                  url: ($b + "/rootfs-linux-amd64.ext4.gz"),
                  sha256: $h_rf
                }
              } else . end
            | if ($h_rfd | length) > 0 then . + {
                rootfs_darwin_arm64: {
                  url: ($b + "/rootfs-darwin-arm64.ext4.gz"),
                  sha256: $h_rfd
                }
              } else . end
            ' > latest.json

      - name: Publish tagged release assets
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.semantic.outputs.tag }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOTES="$(mktemp)"
          trap 'rm -f "$NOTES"' EXIT
          {
            echo "Automated release build for \`${TAG_NAME}\`."
            echo ""
            echo "Assets include Linux amd64 and **Darwin/arm64** (Apple Silicon) CLI binaries, optional prebuilt **Linux/amd64 libkrun host** rootfs (\`rootfs-linux-amd64.ext4.gz\`), optional **macOS/arm64 guest** VM disk (\`rootfs-darwin-arm64.ext4.gz\`, matches \`macvm\` cache layout), \`checksums.txt\`, and \`latest.json\`."
            echo ""
            echo "**Note:** Linux amd64 embeds libkrun helpers (incl. \`nexus-libkrun-vm\`), passt, and the Linux guest-agent (\`CGO_ENABLED=0\`). macOS binaries embed matching Linux guest-agent blobs used by \`nexus vm bake\`."
          } >"$NOTES"
          EXTRA=()
          [ -f dist/rootfs-linux-amd64.ext4.gz ] && EXTRA+=(dist/rootfs-linux-amd64.ext4.gz)
          [ -f dist/rootfs-darwin-arm64.ext4.gz ] && EXTRA+=(dist/rootfs-darwin-arm64.ext4.gz)
          ASSETS=(
            dist/nexus-linux-amd64
            dist/nexus-darwin-arm64
            dist/checksums.txt
            dist/latest.json
            "${EXTRA[@]}"
          )
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPO}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} exists (semantic-release GitHub plugin); uploading build artifacts."
            gh release upload "${TAG_NAME}" "${ASSETS[@]}" --repo "${GITHUB_REPO}" --clobber
          else
            gh release create "${TAG_NAME}" \
              --repo "${GITHUB_REPO}" \
              --verify-tag \
              --title "${TAG_NAME}" \
              --notes-file "$NOTES" \
              "${ASSETS[@]}"
          fi

      - name: Move rolling "latest" tag
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.semantic.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}" --force
          sha="$(git rev-parse "refs/tags/${TAG_NAME}")"
          git tag -f latest "${sha}"
          git push origin refs/tags/latest --force

      - name: Update latest-channel prerelease
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.semantic.outputs.tag }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}" --force
          RELEASE_SHA="$(git rev-parse "refs/tags/${TAG_NAME}")"
          NOTES_FILE="$(mktemp)"
          trap 'rm -f "$NOTES_FILE"' EXIT
          {
            echo "Rolling **latest** channel (prerelease). Points at \`${TAG_NAME}\` (${RELEASE_SHA})."
            echo ""
            echo 'Consume `latest.json` from this release for stable URLs on the prerelease channel, or use the tagged semver release above.'
          } >"$NOTES_FILE"
          EXTRA=()
          [ -f dist/rootfs-linux-amd64.ext4.gz ] && EXTRA+=(dist/rootfs-linux-amd64.ext4.gz)
          [ -f dist/rootfs-darwin-arm64.ext4.gz ] && EXTRA+=(dist/rootfs-darwin-arm64.ext4.gz)
          ASSETS=(
            dist/nexus-linux-amd64
            dist/nexus-darwin-arm64
            dist/checksums.txt
            dist/latest.json
            "${EXTRA[@]}"
          )
          if gh release view latest --repo "${GITHUB_REPO}" >/dev/null 2>&1; then
            gh release edit latest --repo "${GITHUB_REPO}" \
              --prerelease \
              --title latest \
              --notes-file "$NOTES_FILE" \
              --target "${RELEASE_SHA}"
            gh release upload latest "${ASSETS[@]}" --repo "${GITHUB_REPO}" --clobber
          else
            gh release create latest "${ASSETS[@]}" \
              --repo "${GITHUB_REPO}" \
              --prerelease \
              --title latest \
              --target "${RELEASE_SHA}" \
              --notes-file "$NOTES_FILE"
          fi
