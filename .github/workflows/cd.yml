name: CD

on:
  push:
    branches:
      - main
      - test-cd
    tags:
      - "v*"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── main / test-cd: semantic-release + Linux guest rootfs assets ───────────
  semver:
    name: Semantic release
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          latest_tag_before=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          pnpm exec semantic-release --json > /tmp/sr-result.json 2> /tmp/sr-log.txt || true
          cat /tmp/sr-log.txt

          latest_tag_after=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          version=""
          if [ -f /tmp/sr-result.json ] && [ -s /tmp/sr-result.json ]; then
            if command -v jq &> /dev/null; then
              version=$(jq -r '.nextRelease.version // empty' /tmp/sr-result.json 2>/dev/null || true)
            fi
            if [ -z "$version" ]; then
              version=$(grep -o '"version":"[^"]*"' /tmp/sr-result.json | head -1 | cut -d'"' -f4 || true)
            fi
          fi

          if [ -z "$version" ] && [ "$latest_tag_before" != "$latest_tag_after" ] && [ -n "$latest_tag_after" ]; then
            version=$(echo "$latest_tag_after" | sed 's/^v//')
          fi

          if [ -n "$version" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            commit_count=$(git rev-list --count HEAD)
            version="${commit_count}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.semantic.outputs.released == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build binaries
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          VERSION="${{ steps.semantic.outputs.version }}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${VERSION}"

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-amd64 ./cmd/nexus-guest-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-amd64 ./cmd/nexus
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/pty-host-linux-amd64 ./cmd/pty-host
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-arm64 ./cmd/nexus-guest-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-arm64 ./cmd/nexus
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/pty-host-linux-arm64 ./cmd/pty-host

      - name: Create checksums
        if: steps.semantic.outputs.released == 'true'
        run: |
          cd dist
          sha256sum nexus-linux-amd64 nexus-linux-arm64 pty-host-linux-amd64 pty-host-linux-arm64 > sha256sums.txt

      - name: Upload binaries to GitHub Release
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.semantic.outputs.tag }}"
          gh release upload "$tag" \
            dist/nexus-linux-amd64 \
            dist/nexus-linux-arm64 \
            dist/pty-host-linux-amd64 \
            dist/pty-host-linux-arm64 \
            dist/sha256sums.txt \
            --clobber

  guest-rootfs-linux-arm64:
    name: Release asset — Linux arm64 guest rootfs
    needs: semver
    if: needs.semver.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Build nexus-guest-agent (linux/arm64)
        working-directory: packages/nexus
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' \
            -o /tmp/nexus-guest-agent ./cmd/nexus-guest-agent/

      - name: Download Ubuntu 22.04 arm64 root tarball
        run: |
          curl -fsSL --retry 3 -o /tmp/ubuntu-arm64-root.tar.xz \
            "https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-arm64-root.tar.xz"

      - name: Create ext4 + compress + checksum
        run: |
          set -euo pipefail
          STAGING="/tmp/rootfs-staging"
          mkdir -p "$STAGING"
          sudo tar --no-same-owner -xJf /tmp/ubuntu-arm64-root.tar.xz -C "$STAGING"
          sudo chown -R "$(id -u):$(id -g)" "$STAGING"
          mkdir -p "$STAGING/usr/local/bin"
          cp /tmp/nexus-guest-agent "$STAGING/usr/local/bin/nexus-guest-agent"
          chmod 0755 "$STAGING/usr/local/bin/nexus-guest-agent"
          mkdir -p "$STAGING/workspace"
          if ! grep -q '/dev/vda' "$STAGING/etc/fstab" 2>/dev/null; then
            echo "/dev/vda / ext4 rw,relatime 0 1" | tee -a "$STAGING/etc/fstab"
          fi
          sudo mke2fs -F -t ext4 -L nexus-root -d "$STAGING" /tmp/rootfs-linux-arm64.ext4 10G
          gzip -9 -c /tmp/rootfs-linux-arm64.ext4 > /tmp/rootfs-linux-arm64.ext4.gz
          sha256sum /tmp/rootfs-linux-arm64.ext4.gz | tee /tmp/rootfs-linux-arm64.ext4.gz.sha256

      - name: Upload rootfs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.semver.outputs.tag }}"
          gh release upload "$tag" \
            /tmp/rootfs-linux-arm64.ext4.gz \
            /tmp/rootfs-linux-arm64.ext4.gz.sha256 \
            --repo "${{ github.repository }}" \
            --clobber

  guest-rootfs-macos:
    name: Release asset — macOS libkrun guest rootfs
    needs: semver
    if: needs.semver.outputs.released == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs
        run: brew install e2fsprogs

      - name: Build nexus-guest-agent (linux/arm64)
        working-directory: packages/nexus
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' \
            -o /tmp/nexus-guest-agent ./cmd/nexus-guest-agent/

      - name: Download Ubuntu 22.04 arm64 root tarball
        run: |
          curl -fsSL --retry 3 -o /tmp/ubuntu-arm64-root.tar.xz \
            "https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-arm64-root.tar.xz"

      - name: Create ext4 + compress + checksum
        run: |
          set -euo pipefail
          MKE2FS="$(command -v mke2fs || true)"
          if [[ -z "$MKE2FS" ]]; then
            MKE2FS="$(ls /opt/homebrew/opt/e2fsprogs/sbin/mke2fs 2>/dev/null || ls /usr/local/opt/e2fsprogs/sbin/mke2fs)"
          fi
          if [[ -z "$MKE2FS" || ! -x "$MKE2FS" ]]; then
            echo "ERROR: mke2fs not found (brew install e2fsprogs)" >&2
            exit 1
          fi
          STAGING="/tmp/rootfs-staging"
          mkdir -p "$STAGING"
          sudo tar --no-same-owner -xJf /tmp/ubuntu-arm64-root.tar.xz -C "$STAGING"
          sudo chown -R "$(id -u):$(id -g)" "$STAGING"
          mkdir -p "$STAGING/usr/local/bin"
          cp /tmp/nexus-guest-agent "$STAGING/usr/local/bin/nexus-guest-agent"
          chmod 0755 "$STAGING/usr/local/bin/nexus-guest-agent"
          mkdir -p "$STAGING/workspace"
          if ! grep -q '/dev/vda' "$STAGING/etc/fstab" 2>/dev/null; then
            echo "/dev/vda / ext4 rw,relatime 0 1" | tee -a "$STAGING/etc/fstab"
          fi
          "$MKE2FS" -F -t ext4 -L nexus-root -d "$STAGING" /tmp/rootfs-macos-arm64.ext4 10G
          gzip -9 -c /tmp/rootfs-macos-arm64.ext4 > /tmp/rootfs-macos-arm64.ext4.gz
          shasum -a 256 /tmp/rootfs-macos-arm64.ext4.gz | tee /tmp/rootfs-macos-arm64.ext4.gz.sha256

      - name: Upload rootfs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.semver.outputs.tag }}"
          gh release upload "$tag" \
            /tmp/rootfs-macos-arm64.ext4.gz \
            /tmp/rootfs-macos-arm64.ext4.gz.sha256 \
            --repo "${{ github.repository }}" \
            --clobber

  # ── Version tags v*: cross-platform CLI release + pre-baked libkrun host rootfs ──
  release-build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build embedded Linux guest-agent
        if: matrix.goos == 'linux'
        working-directory: packages/nexus/cmd/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          rm -f "agent-linux-${{ matrix.goarch }}"
          go build -trimpath -ldflags='-s -w' \
            -o "agent-linux-${{ matrix.goarch }}" \
            ../nexus-guest-agent/

      - name: Stage Linux amd64 libkrun embeds
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: bash scripts/ci/stage-nexus-linux-embeds.sh

      # go:embed libkrun-darwin-arm64.dylib (committed .gitignore); same blobs used for amd64/arm64 slices.
      - name: Stage libkrun dylibs for macOS embed
        if: matrix.goos == 'darwin'
        run: bash scripts/local/build-libkrun-darwin.sh

      - name: Build nexus binary
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          outfile="nexus-${{ matrix.goos }}-${{ matrix.goarch }}"
          rm -f "$outfile"
          go build -trimpath -ldflags="-s -w" -o "$outfile" ./cmd/nexus

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packages/nexus/nexus-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release-host-rootfs:
    name: Pre-bake libkrun host rootfs (linux/amd64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: "true"
      GOTOOLCHAIN: local
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
      NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "128"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "128"
      NEXUS_LIBKRUN_MEM_MIB: "256"
      NEXUS_PASST_PATH: /tmp/passt-patched
      NEXUS_RELEASE_ROOTFS_BAKE_TIMEOUT: "55m"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Enable KVM access
        run: scripts/ci/enable-kvm.sh

      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Set up XFS reflink volume for libkrun workspaces
        run: scripts/ci/setup-xfs-reflink.sh

      - name: Prepare libkrun bake cache paths
        run: scripts/ci/prepare-libkrun-cache-env.sh

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v6-${{ runner.os }}-${{ hashFiles('Nexusfile', 'schemas/nexusfile.schema.json', 'packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/internal/infra/runtime/libkrun/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**', 'packages/nexus/cmd/nexus/nexus-libkrun-vm', 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go') }}
          restore-keys: |
            libkrun-baked-v6-${{ runner.os }}-

      - name: Hydrate cached VM assets to host paths
        timeout-minutes: 25
        env:
          STEP_TIMEOUT_SECONDS: "1200"
        run: scripts/ci/hydrate-libkrun-cache.sh

      - name: Verify pre-baked VM assets (cache hint)
        run: scripts/ci/verify-vm-assets.sh hint

      - name: Build embedded guest-agent + libkrun nexus (Linux CI)
        timeout-minutes: 10
        run: scripts/ci/build-nexus-libkrun.sh

      - name: Build patched passt for bake VM networking
        timeout-minutes: 10
        run: bash scripts/ci/build-passt.sh

      - name: Provision libkrun host (kernel + base rootfs)
        timeout-minutes: 10
        run: scripts/ci/provision-libkrun-host.sh

      - name: Verify VM assets after provisioning
        run: scripts/ci/verify-vm-assets.sh required

      - name: Pre-bake tools into host rootfs and compress
        timeout-minutes: 65
        env:
          NEXUS_PASST_PATH: /tmp/passt-patched
        run: bash scripts/ci/build-release-host-rootfs-bake-and-package.sh

      - name: Upload host rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-linux-amd64-host
          path: dist/rootfs-linux-amd64.ext4.gz
          if-no-files-found: error

  release-darwin-guest-rootfs:
    name: macOS guest rootfs (linux/arm64 image for libkrun)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    timeout-minutes: 120
    env:
      NEXUS_LIBKRUN_BAKE_TIMEOUT: 55m
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build + bake guest rootfs (macOS Hypervisor)
        run: bash scripts/ci/build-release-darwin-arm64-guest-rootfs.sh

      - name: Upload darwin guest rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-darwin-arm64-guest
          path: dist/rootfs-darwin-arm64.ext4.gz
          if-no-files-found: error

  release-publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-build, release-host-rootfs, release-darwin-guest-rootfs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist

      - name: Download host rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-linux-amd64-host
          path: dist

      - name: Download darwin guest rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-darwin-arm64-guest
          path: dist

      - name: Prepare checksums and latest.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          bins=(nexus-*)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "no nexus-* binaries in dist/"
            ls -la
            exit 1
          fi
          VM_HELPER_SRC="${GITHUB_WORKSPACE}/packages/nexus/cmd/nexus/nexus-libkrun-vm"
          if [ -f "${VM_HELPER_SRC}" ]; then
            cp -f "${VM_HELPER_SRC}" nexus-libkrun-vm-linux-amd64
          else
            echo "missing nexus-libkrun-vm at ${VM_HELPER_SRC}" >&2
            exit 1
          fi
          extra=()
          [ -f rootfs-linux-amd64.ext4.gz ] && extra+=(rootfs-linux-amd64.ext4.gz)
          [ -f rootfs-darwin-arm64.ext4.gz ] && extra+=(rootfs-darwin-arm64.ext4.gz)
          sha256sum nexus-* nexus-libkrun-vm-linux-amd64 "${extra[@]}" > checksums.txt

          VERSION="${GITHUB_REF_NAME}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"

          hash_for() {
            local f="$1"
            grep -F " ${f}" checksums.txt | awk '{print $1}'
          }

          ROOTFS_SHA=""
          if [ -f rootfs-linux-amd64.ext4.gz ]; then
            ROOTFS_SHA="$(hash_for rootfs-linux-amd64.ext4.gz)"
          fi

          ROOTFS_DARWIN_SHA=""
          if [ -f rootfs-darwin-arm64.ext4.gz ]; then
            ROOTFS_DARWIN_SHA="$(hash_for rootfs-darwin-arm64.ext4.gz)"
          fi

          jq -n \
            --arg ver "${VERSION}" \
            --arg pub "${PUB_DATE}" \
            --arg b "${BASE_URL}" \
            --arg h_la "$(hash_for nexus-linux-amd64)" \
            --arg h_larm "$(hash_for nexus-linux-arm64)" \
            --arg h_da "$(hash_for nexus-darwin-amd64)" \
            --arg h_darm "$(hash_for nexus-darwin-arm64)" \
            --arg h_rf "${ROOTFS_SHA}" \
            --arg h_rfd "${ROOTFS_DARWIN_SHA}" \
            '
            {
              version: $ver,
              pub_date: $pub,
              platforms: {
                "linux-amd64": { url: ($b + "/nexus-linux-amd64"), sha256: $h_la },
                "linux-arm64": { url: ($b + "/nexus-linux-arm64"), sha256: $h_larm },
                "darwin-amd64": { url: ($b + "/nexus-darwin-amd64"), sha256: $h_da },
                "darwin-arm64": { url: ($b + "/nexus-darwin-arm64"), sha256: $h_darm }
              }
            }
            | if ($h_rf | length) > 0 then . + {
                rootfs_linux_amd64: {
                  url: ($b + "/rootfs-linux-amd64.ext4.gz"),
                  sha256: $h_rf
                }
              } else . end
            | if ($h_rfd | length) > 0 then . + {
                rootfs_darwin_arm64: {
                  url: ($b + "/rootfs-darwin-arm64.ext4.gz"),
                  sha256: $h_rfd
                }
              } else . end
            ' > latest.json

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOTES="$(mktemp)"
          trap 'rm -f "$NOTES"' EXIT
          {
            echo "Automated release build for \`${TAG_NAME}\`."
            echo ""
            echo "Assets include cross-platform CLI binaries, optional prebuilt **Linux/amd64 libkrun host** rootfs (\`rootfs-linux-amd64.ext4.gz\`), optional **macOS/ARM64 guest** VM disk (\`rootfs-darwin-arm64.ext4.gz\`, matches \`macvm\` cache layout), \`checksums.txt\`, and \`latest.json\`."
            echo ""
            echo "**Note:** Linux binaries embed the Linux guest-agent (\`CGO_ENABLED=0\`). macOS binaries do not embed the Linux agent bundle."
          } >"$NOTES"
          EXTRA=()
          [ -f dist/rootfs-linux-amd64.ext4.gz ] && EXTRA+=(dist/rootfs-linux-amd64.ext4.gz)
          [ -f dist/rootfs-darwin-arm64.ext4.gz ] && EXTRA+=(dist/rootfs-darwin-arm64.ext4.gz)
          gh release create "${TAG_NAME}" \
            --repo "${GITHUB_REPO}" \
            --verify-tag \
            --title "${TAG_NAME}" \
            --notes-file "$NOTES" \
            dist/nexus-linux-amd64 \
            dist/nexus-linux-arm64 \
            dist/nexus-darwin-amd64 \
            dist/nexus-darwin-arm64 \
            dist/nexus-libkrun-vm-linux-amd64 \
            dist/checksums.txt \
            dist/latest.json \
            "${EXTRA[@]}"

      - name: Move rolling "latest" tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force

      - name: Update latest-channel prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"
          trap 'rm -f "$NOTES_FILE"' EXIT
          {
            echo "Rolling **latest** channel (prerelease). Points at \`${TAG_NAME}\` (${SHA})."
            echo ""
            echo 'Consume `latest.json` from this release for stable URLs on the prerelease channel, or use the tagged semver release above.'
          } >"$NOTES_FILE"
          EXTRA=()
          [ -f dist/rootfs-linux-amd64.ext4.gz ] && EXTRA+=(dist/rootfs-linux-amd64.ext4.gz)
          [ -f dist/rootfs-darwin-arm64.ext4.gz ] && EXTRA+=(dist/rootfs-darwin-arm64.ext4.gz)
          ASSETS=(
            dist/nexus-linux-amd64
            dist/nexus-linux-arm64
            dist/nexus-darwin-amd64
            dist/nexus-darwin-arm64
            dist/nexus-libkrun-vm-linux-amd64
            dist/checksums.txt
            dist/latest.json
            "${EXTRA[@]}"
          )
          if gh release view latest --repo "${GITHUB_REPO}" >/dev/null 2>&1; then
            gh release edit latest --repo "${GITHUB_REPO}" \
              --prerelease \
              --title latest \
              --notes-file "$NOTES_FILE" \
              --target "${SHA}"
            gh release upload latest "${ASSETS[@]}" --repo "${GITHUB_REPO}" --clobber
          else
            gh release create latest "${ASSETS[@]}" \
              --repo "${GITHUB_REPO}" \
              --prerelease \
              --title latest \
              --target "${SHA}" \
              --notes-file "$NOTES_FILE"
          fi