name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  semantic-release:
    name: Semantic Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Single shell gate: GitHub expression + fromJSON on job outputs is easy to get
  # wrong; cycjimmy only sets new_release_published when a release is created.
  release-gate:
    name: Release gate
    needs: [semantic-release]
    if: |
      always() &&
      (
        startsWith(github.ref, 'refs/tags/v')
        || (
          github.ref == 'refs/heads/main'
          && needs.semantic-release.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    outputs:
      do_assets: ${{ steps.gate.outputs.do_assets }}
      checkout_ref: ${{ steps.gate.outputs.checkout_ref }}
      version: ${{ steps.gate.outputs.version }}
      tag: ${{ steps.gate.outputs.tag }}
    steps:
      - id: gate
        env:
          REF: ${{ github.ref }}
          RELEASED: ${{ needs.semantic-release.outputs.released }}
          SR_TAG: ${{ needs.semantic-release.outputs.tag }}
          SR_VERSION: ${{ needs.semantic-release.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "$REF" == refs/tags/v* ]]; then
            tag="${REF#refs/tags/}"
            echo "do_assets=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$tag" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$RELEASED" == "true" ]]; then
            echo "do_assets=true" >> "$GITHUB_OUTPUT"
            if [[ -n "$SR_TAG" ]]; then
              echo "checkout_ref=$SR_TAG" >> "$GITHUB_OUTPUT"
              echo "tag=$SR_TAG" >> "$GITHUB_OUTPUT"
            else
              echo "checkout_ref=main" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
            fi
            echo "version=$SR_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "do_assets=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=main" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Run CI Tests
    needs: [release-gate]
    if: needs.release-gate.outputs.do_assets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-gate.outputs.checkout_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Task
        uses: arduino/setup-task@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true

  build:
    name: Build for ${{ matrix.os }}
    needs: [release-gate]
    if: needs.release-gate.outputs.do_assets == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: nexus-linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: nexus-linux-arm64
          - os: macos-latest
            target: darwin-amd64
            artifact: nexus-darwin-amd64
          - os: macos-latest
            target: darwin-arm64
            artifact: nexus-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-gate.outputs.checkout_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install Task
        uses: arduino/setup-task@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download embedded blobs (mutagen + firecracker)
        shell: bash
        run: |
          task mutagen:update
          task firecracker:update

      - name: Generate Linux embeds (agent + tap-helper for target arch)
        if: startsWith(matrix.target, 'linux-')
        shell: bash
        working-directory: packages/nexus
        run: |
          tgt="${{ matrix.target }}"
          GOOS=linux GOARCH="${tgt##linux-}" go generate ./cmd/nexus/

      - name: Build binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p dist
          GOOS=$(echo ${{ matrix.target }} | cut -d'-' -f1)
          GOARCH=$(echo ${{ matrix.target }} | cut -d'-' -f2)
          go build -trimpath -ldflags='-s -w' -o "dist/${{ matrix.artifact }}" ./cmd/nexus

      - name: Package binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p release
          version="${{ needs.release-gate.outputs.version }}"
          if [[ -z "$version" ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          fi
          archive="nexus-${version}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/nexus/release/*

  release:
    name: Create Release
    needs: [release-gate, test, build]
    if: |
      needs.release-gate.result == 'success'
      && needs.test.result == 'success'
      && needs.build.result == 'success'
      && needs.release-gate.outputs.do_assets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Nexus v${{ needs.release-gate.outputs.version != '' && needs.release-gate.outputs.version || github.ref_name }}
          tag_name: ${{ needs.release-gate.outputs.tag != '' && needs.release-gate.outputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
