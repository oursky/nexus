name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (nexus)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Verify go tool fix produces no diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git ls-files '*.go')
          if [ ${#go_files[@]} -eq 0 ]; then
            echo "No Go files found; skipping go fix check"
            exit 0
          fi

          tmp_diff="$(mktemp)"
          go_fix_version="go$(go env GOVERSION | sed 's/^go//')"
          go tool fix -go="$go_fix_version" -diff "${go_files[@]}" >"$tmp_diff"
          if [ -s "$tmp_diff" ]; then
            echo "go tool fix reported changes. Please run: go tool fix -go=$go_fix_version <files>"
            cat "$tmp_diff"
            exit 1
          fi

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1

      - name: Build embedded guest-agent binary (required for embed directive)
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Run golangci-lint
        working-directory: packages/nexus
        run: golangci-lint run ./...

  unit-tests:
    name: Unit Tests (nexus)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@v3.42.0

      - name: Build embedded guest-agent binary
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      # Build cross-platform nexus binary for fat bundle tests.
      - name: Build cross-platform nexus binary (darwin/arm64)
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/packages/nexus-swift/Resources"
          go build -trimpath -ldflags "-s -w" \
            -o "${GITHUB_WORKSPACE}/packages/nexus-swift/Resources/nexus-darwin-arm64" \
            ./cmd/nexus
          echo "NEXUS_CROSS_BINARY_DIR=${GITHUB_WORKSPACE}/packages/nexus-swift/Resources" >> "$GITHUB_ENV"

      - name: Run unit tests with coverage
        env:
          GOTOOLCHAIN: local
        run: scripts/ci/coverage.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-go-coverage
          path: packages/nexus/coverage.out
          retention-days: 7

  e2e:
    name: E2E Tests (linux)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@v3.42.0

      # Make /dev/kvm accessible to the runner user without needing group
      # membership. On self-hosted runners KVM is typically pre-configured;
      # only attempt the udev rule if /dev/kvm isn't already world-accessible.
      - name: Enable KVM access
        run: scripts/ci/enable-kvm.sh

      # Tools required for rootfs and e2e tests.
      #   squashfs-tools  → unsquashfs (squashfs → rootfs tree)
      #   e2fsprogs       → mkfs.ext4, debugfs (create and modify rootfs image)
      #   rsync           → copy rootfs tree into ext4 image
      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Set up XFS reflink volume for libkrun workspaces
        run: scripts/ci/setup-xfs-reflink.sh

      - name: Prepare libkrun bake cache paths
        run: scripts/ci/prepare-libkrun-cache-env.sh

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v4-${{ runner.os }}-${{ hashFiles('Nexusfile', 'schemas/nexusfile.schema.json', 'packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/internal/infra/runtime/libkrun/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/main.go', 'packages/nexus/cmd/nexus-guest-agent/sysconfig.go', 'packages/nexus/cmd/nexus/nexus-libkrun-vm', 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go') }}
          restore-keys: |
            libkrun-baked-v4-${{ runner.os }}-

      - name: Hydrate cached VM assets to host paths
        timeout-minutes: 5
        run: scripts/ci/hydrate-libkrun-cache.sh

      - name: Verify pre-baked VM assets (cache hint)
        run: scripts/ci/verify-vm-assets.sh hint

      # Build the guest-agent binary so the //go:embed directive in
      # embed_agent_linux_amd64.go is satisfied before compiling nexus.
      # This step also builds the kernel ELF (if cache miss) and embeds it.
      - name: Build embedded guest-agent binary
        timeout-minutes: 5
        run: scripts/ci/build-nexus-libkrun.sh

      # Build cross-platform nexus binary for fat bundle tests.
      # The bundle exporter embeds both linux-amd64 and darwin-arm64 binaries.
      - name: Build cross-platform nexus binary (darwin/arm64)
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/packages/nexus-swift/Resources"
          go build -trimpath -ldflags "-s -w" \
            -o "${GITHUB_WORKSPACE}/packages/nexus-swift/Resources/nexus-darwin-arm64" \
            ./cmd/nexus
          echo "NEXUS_CROSS_BINARY_DIR=${GITHUB_WORKSPACE}/packages/nexus-swift/Resources" >> "$GITHUB_ENV"

      - name: Build patched passt for containerized CI
        timeout-minutes: 5
        run: |
          set -euo pipefail
          git clone --depth 1 https://passt.top/passt /tmp/passt
          cd /tmp/passt
          python3 << 'PYEOF'
          with open('isolation.c', 'r') as f:
              lines = f.readlines()

          new_lines = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if 'if (unshare(flags)) {' in line:
                  new_lines.append(line)
                  new_lines.append('\t\tif (errno == EPERM) {\n')
                  new_lines.append('\t\t\twarn("Skipping sandboxing: namespace creation blocked");\n')
                  new_lines.append('\t\t\treturn 0;\n')
                  new_lines.append('\t\t}\n')
                  i += 1
                  continue
              if 'prctl(PR_SET_SECCOMP, SECCOMP_MODE_FILTER, &prog))' in line:
                  new_lines.append(line.rstrip().rstrip(';') + ' {\n')
                  i += 1
                  if i < len(lines) and 'die_perror("Failed to apply seccomp filter")' in lines[i]:
                      new_lines.append('\t\tif (errno == EPERM) {\n')
                      new_lines.append('\t\t\twarn("Skipping seccomp filter: not permitted");\n')
                      new_lines.append('\t\t\treturn;\n')
                      new_lines.append('\t\t}\n')
                      new_lines.append(lines[i])
                      new_lines.append('\t}\n')
                      i += 1
                  continue
              new_lines.append(line)
              i += 1

          with open('isolation.c', 'w') as f:
              f.writelines(new_lines)
          PYEOF
          make clean
          make CFLAGS="-static -DGLIBC_NO_STATIC_NSS" passt
          chmod +x passt
          cp passt /tmp/passt-patched
          echo "NEXUS_PASST_PATH=/tmp/passt-patched" >> "$GITHUB_ENV"

      # Pre-provision libkrun host infrastructure once before the test suite.
      # daemon start auto-provisions on first run; we start it briefly then stop
      # it so that every per-test daemon start finds everything already in place
      # and skips the slow setup path.
      - name: Provision libkrun host (kernel + rootfs)
        timeout-minutes: 5
        run: scripts/ci/provision-libkrun-host.sh

      - name: Verify VM assets after provisioning
        run: scripts/ci/verify-vm-assets.sh required

      - name: Probe runner VM network forwarding
        id: runner-network-probe
        continue-on-error: true
        run: scripts/ci/probe-runner-network.sh

      - name: Prewarm default-profile baked rootfs (best effort, bounded)
        if: steps.runner-network-probe.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 5
        run: scripts/ci/prewarm-default-profile.sh
        env:
          NEXUS_PASST_PATH: /tmp/passt-patched

      - name: Refresh baked VM cache contents
        if: always()
        timeout-minutes: 5
        run: scripts/ci/refresh-libkrun-cache.sh

      - name: Bootstrap e2e SSH profile
        timeout-minutes: 5
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          source ../../scripts/ci/e2e-ssh-bootstrap.sh

      - name: Run e2e tests (auth, daemon, fs)
        timeout-minutes: 5
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          sudo -E env \
            "PATH=$PATH" \
            "HOME=$HOME" \
            "NEXUS_PASST_PATH=$NEXUS_PASST_PATH" \
            "NEXUS_CROSS_BINARY_DIR=$NEXUS_CROSS_BINARY_DIR" \
            "NEXUS_E2E_BINARY=$NEXUS_E2E_BINARY" \
            go test -tags e2e -count=1 -timeout=5m -v -p 2 -parallel 2 \
            ./test/e2e/auth ./test/e2e/daemon ./test/e2e/fs

      - name: Run e2e tests (project, pty, spotlight)
        timeout-minutes: 5
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          sudo -E env \
            "PATH=$PATH" \
            "HOME=$HOME" \
            "NEXUS_PASST_PATH=$NEXUS_PASST_PATH" \
            "NEXUS_CROSS_BINARY_DIR=$NEXUS_CROSS_BINARY_DIR" \
            "NEXUS_E2E_BINARY=$NEXUS_E2E_BINARY" \
            go test -tags e2e -count=1 -timeout=5m -v -p 2 -parallel 2 \
            ./test/e2e/project ./test/e2e/pty ./test/e2e/spotlight

      - name: Run e2e tests (vmproof, workspace)
        timeout-minutes: 5
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          sudo -E env \
            "PATH=$PATH" \
            "HOME=$HOME" \
            "NEXUS_PASST_PATH=$NEXUS_PASST_PATH" \
            "NEXUS_CROSS_BINARY_DIR=$NEXUS_CROSS_BINARY_DIR" \
            "NEXUS_E2E_BINARY=$NEXUS_E2E_BINARY" \
            go test -tags e2e -count=1 -timeout=5m -v -p 2 -parallel 2 \
            ./test/e2e/vmproof ./test/e2e/workspace

      - name: Run e2e tests (cli)
        timeout-minutes: 5
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          sudo -E env \
            "PATH=$PATH" \
            "HOME=$HOME" \
            "NEXUS_PASST_PATH=$NEXUS_PASST_PATH" \
            "NEXUS_CROSS_BINARY_DIR=$NEXUS_CROSS_BINARY_DIR" \
            "NEXUS_E2E_BINARY=$NEXUS_E2E_BINARY" \
            go test -tags e2e -count=1 -timeout=5m -v -p 2 -parallel 2 ./test/e2e/cli
        env:
          CI: true
          NEXUS_LIBKRUN_SKIP_BAKE: "1"
          NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
          NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
          NEXUS_VM_KERNEL: /var/lib/nexus/vmlinux.bin
          NEXUS_VM_ROOTFS: /var/lib/nexus/rootfs.ext4
          NEXUS_WORKSPACE_IMAGE_MIN_MIB: "512"
          NEXUS_RUNNER_ROOTFS_MIN_MIB: "512"
          NEXUS_LIBKRUN_MEM_MIB: "256"
          NEXUS_PASST_PATH: /tmp/passt-patched

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  # Matches hkfc-style macOS builds: use repository variable NEXUS_MACOS_DEVELOPER_DIR
  # (e.g. /Applications/Xcode_16.2.app/Contents/Developer) on self-hosted runners
  # that install Xcode outside the default path.
  nexus-swift-macos:
    name: NexusApp (macOS)
    runs-on: [self-hosted, macOS, ARM64, v2, tw]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -n "${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}" ]; then
            XCODE_DIR="${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}"
          else
            # Fall back to the first available Xcode under /Volumes/xcodes.
            XCODE_DIR="$(ls -d /Volumes/xcodes/Xcode_*.app 2>/dev/null | sort -V | tail -1)/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          echo "Selected Xcode: $XCODE_DIR"
          xcode-select -p || true

      - name: Download Metal Toolchain (if missing)
        run: xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -5 || true

      - name: Build NexusApp (Debug)
        run: scripts/swift/build.sh
