name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go-fix:
    name: Go Fix Check
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Verify go tool fix produces no diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git ls-files '*.go')
          if [ ${#go_files[@]} -eq 0 ]; then
            echo "No Go files found; skipping go fix check"
            exit 0
          fi

          tmp_diff="$(mktemp)"
          go tool fix -go=go1.24 -diff "${go_files[@]}" >"$tmp_diff"
          if [ -s "$tmp_diff" ]; then
            echo "go tool fix reported changes. Please run: go tool fix -go=go1.24 <files>"
            cat "$tmp_diff"
            exit 1
          fi

  coverage:
    name: Go Coverage (nexus)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build embedded guest-agent binary
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Run full Go test coverage
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-go-coverage
          path: packages/nexus/coverage.out
          retention-days: 7

  ci:
    name: Core CI (linux)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      # Make /dev/kvm accessible to the runner user without needing group
      # membership. On self-hosted runners KVM is typically pre-configured;
      # only attempt the udev rule if /dev/kvm isn't already world-accessible.
      - name: Enable KVM access
        run: |
          if [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "/dev/kvm already accessible — skipping udev rule"
          elif [ -d /etc/udev/rules.d ]; then
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
              | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm
          else
            sudo chmod 0666 /dev/kvm 2>/dev/null || true
          fi
          ls -la /dev/kvm

      # Tools required for rootfs and e2e tests.
      #   squashfs-tools  → unsquashfs (squashfs → rootfs tree)
      #   e2fsprogs       → mkfs.ext4, debugfs (create and modify rootfs image)
      #   rsync           → copy rootfs tree into ext4 image
      - name: Install host prerequisites
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20 update -qq \
              && sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20 install -y squashfs-tools e2fsprogs rsync; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "host prerequisite install failed after 3 attempts"
              exit 1
            fi
            echo "host prerequisite install failed (attempt $attempt/3), retrying..."
            sleep $((attempt * 5))
          done

      - name: Prepare libkrun bake cache paths
        run: |
          mkdir -p "$RUNNER_TEMP/libkrun-baked-cache"
          echo "LIBKRUN_BAKED_CACHE_DIR=$RUNNER_TEMP/libkrun-baked-cache" >> "$GITHUB_ENV"

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v1-${{ runner.os }}-${{ hashFiles('packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/cmd/nexus-guest-agent/main.go', 'packages/nexus/cmd/nexus/nexus-libkrun-vm') }}

      - name: Hydrate cached VM assets to host paths
        if: steps.libkrun-baked-cache.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          CACHE_DIR="${LIBKRUN_BAKED_CACHE_DIR}"
          sudo install -d -m 0755 /var/lib/nexus /root/.local/share/nexus/vm /root/.local/state/nexus
          for f in vmlinux.bin rootfs.ext4; do
            if [[ ! -f "$CACHE_DIR/$f" ]]; then
              echo "cache hit but missing $f in $CACHE_DIR"
              exit 1
            fi
            sudo cp "$CACHE_DIR/$f" "/var/lib/nexus/$f"
            sudo cp "$CACHE_DIR/$f" "/root/.local/share/nexus/vm/$f"
            sudo chmod 644 "/var/lib/nexus/$f" "/root/.local/share/nexus/vm/$f"
          done
          if [[ -f "$CACHE_DIR/rootfs-agent.sha256" ]]; then
            sudo cp "$CACHE_DIR/rootfs-agent.sha256" /root/.local/state/nexus/rootfs-agent.sha256
          fi
          if [[ -f "$CACHE_DIR/rootfs-baked-v4" ]]; then
            sudo cp "$CACHE_DIR/rootfs-baked-v4" /root/.local/state/nexus/rootfs-baked-v4
          fi
          # Keep runner user state aligned with root state for e2e daemon startup.
          mkdir -p "$HOME/.local/state/nexus"
          if sudo test -f /root/.local/state/nexus/rootfs-agent.sha256; then
            sudo cat /root/.local/state/nexus/rootfs-agent.sha256 > "$HOME/.local/state/nexus/rootfs-agent.sha256"
          fi

      # Build the guest-agent binary so the //go:embed directive in
      # embed_agent_linux_amd64.go is satisfied before compiling nexus.
      - name: Build embedded guest-agent binary
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      # Pre-provision libkrun host infrastructure once before the test suite.
      # daemon start auto-provisions on first run; we start it briefly then stop
      # it so that every per-test daemon start finds everything already in place
      # and skips the slow setup path.
      - name: Build nexus binary (with libkrun embed)
        working-directory: packages/nexus
        env:
          SMOLVM_VERSION: v0.5.19
        run: |
          set -euo pipefail
          EMBED_DIR="$PWD/cmd/nexus"

          # Stage libkrun shared libraries from smolvm release if nexus-libkrun-vm is present.
          if [[ -f "$EMBED_DIR/nexus-libkrun-vm" ]]; then
            SMOLVM_TARBALL="smolvm-${SMOLVM_VERSION#v}-linux-x86_64.tar.gz"
            SMOLVM_URL="https://github.com/smol-machines/smolvm/releases/download/${SMOLVM_VERSION}/${SMOLVM_TARBALL}"
            LIBS_TMP="/tmp/smolvm-libs-${SMOLVM_VERSION}"

            if [[ ! -d "$LIBS_TMP" ]]; then
              curl -fsSL --retry 3 -o "/tmp/${SMOLVM_TARBALL}" "$SMOLVM_URL"
              mkdir -p "$LIBS_TMP"
              tar -xzf "/tmp/${SMOLVM_TARBALL}" --strip-components=2 -C "$LIBS_TMP" \
                "smolvm-${SMOLVM_VERSION#v}-linux-x86_64/lib"
            fi

            cp "$LIBS_TMP/libkrun.so.1" "$EMBED_DIR/libkrun-embed.so"
            LIBKRUNFW_REAL=$(find "$LIBS_TMP" -maxdepth 1 -name 'libkrunfw.so.*.*' | sort | tail -1)
            cp "$LIBKRUNFW_REAL" "$EMBED_DIR/libkrunfw-embed.so"
            BUILD_TAGS="-tags libkrun"
            echo "Building nexus with libkrun embed..."
          else
            BUILD_TAGS=""
            echo "nexus-libkrun-vm not found — building without libkrun embed"
          fi

          # shellcheck disable=SC2086
          CGO_ENABLED=0 go build $BUILD_TAGS -o /tmp/nexus-bin ./cmd/nexus/
          rm -f "$EMBED_DIR/libkrun-embed.so" "$EMBED_DIR/libkrunfw-embed.so"
          echo "NEXUS_E2E_BINARY=/tmp/nexus-bin" >> "$GITHUB_ENV"

      - name: Provision libkrun host (kernel + rootfs)
        run: |
          SOCK=/tmp/nexus-provision.sock
          DB=/tmp/nexus-provision.db
          sudo /tmp/nexus-bin daemon start \
            --db "$DB" --socket "$SOCK" \
            --workdir-root /tmp/nexus-provision-work &
          DPID=$!
          # Wait up to 900 s for the socket to appear. First-run provisioning
          # includes rootfs bake and can legitimately take several minutes.
          # The daemon starts accepting connections only after provisioning.
          timeout 900 bash -c 'until [ -S "$0" ]; do sleep 2; done' "$SOCK" \
            || { echo "daemon setup timed out after 900s"; kill $DPID; exit 1; }
          # Gracefully stop the provisioning daemon.
          sudo /tmp/nexus-bin daemon stop --socket "$SOCK" 2>/dev/null \
            || kill $DPID 2>/dev/null || true
          wait $DPID 2>/dev/null || true
          # The provisioning daemon (running as root) creates $HOME/.local as
          # root:root 755 via resolveInstallBinDir. Fix ownership so the runner
          # user can subsequently create subdirectories (e.g. .local/share/).
          sudo chown -R "$USER":"$USER" "$HOME/.local" 2>/dev/null || true

          # The rootless bootstrap installs VM assets into root's XDG data dir
          # (/root/.local/share/nexus/vm/). E2E test daemons run as the runner
          # user and fall back to /var/lib/nexus/ before re-downloading. Copy
          # (using hard links when possible — instant, zero extra space) root's
          # assets there so per-test daemons skip the expensive asset-install.
          ROOT_VM=/root/.local/share/nexus/vm
          if sudo test -d "$ROOT_VM"; then
            sudo install -d -m 0755 /var/lib/nexus
            for f in vmlinux.bin rootfs.ext4; do
              SRC="$ROOT_VM/$f"
              DST="/var/lib/nexus/$f"
              if sudo test -f "$SRC" && ! sudo test -e "$DST"; then
                # Hard-link first (instant); fall back to copy if cross-fs.
                sudo ln "$SRC" "$DST" 2>/dev/null || sudo cp "$SRC" "$DST"
                sudo chmod 644 "$DST"
              fi
            done
          fi

          # Copy the agent-hash stamp from root's state dir to the runner user's
          # so E2E test daemons skip the slow e2fsck + debugfs injection.
          ROOT_HASH=/root/.local/state/nexus/rootfs-agent.sha256
          USER_HASH="$HOME/.local/state/nexus/rootfs-agent.sha256"
          if sudo test -f "$ROOT_HASH"; then
            mkdir -p "$(dirname "$USER_HASH")"
            sudo cat "$ROOT_HASH" > "$USER_HASH"
          fi

      - name: Refresh baked VM cache contents
        if: always()
        run: |
          set -euo pipefail
          CACHE_DIR="${LIBKRUN_BAKED_CACHE_DIR}"
          mkdir -p "$CACHE_DIR"
          if sudo test -f /root/.local/share/nexus/vm/vmlinux.bin; then
            sudo cp /root/.local/share/nexus/vm/vmlinux.bin "$CACHE_DIR/vmlinux.bin"
          fi
          if sudo test -f /root/.local/share/nexus/vm/rootfs.ext4; then
            sudo cp /root/.local/share/nexus/vm/rootfs.ext4 "$CACHE_DIR/rootfs.ext4"
          fi
          if sudo test -f /root/.local/state/nexus/rootfs-agent.sha256; then
            sudo cp /root/.local/state/nexus/rootfs-agent.sha256 "$CACHE_DIR/rootfs-agent.sha256"
          fi
          if sudo test -f /root/.local/state/nexus/rootfs-baked-v4; then
            sudo cp /root/.local/state/nexus/rootfs-baked-v4 "$CACHE_DIR/rootfs-baked-v4"
          fi

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true
          NEXUS_VM_KERNEL: /var/lib/nexus/vmlinux.bin
          NEXUS_VM_ROOTFS: /var/lib/nexus/rootfs.ext4
          # Use a small workspace image so mkfs.ext4 finishes in seconds on CI.
          NEXUS_WORKSPACE_IMAGE_MIN_MIB: "512"
          # Limit VM memory to reduce peak RSS when tests run in parallel.
          NEXUS_LIBKRUN_MEM_MIB: "256"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  # Matches hkfc-style macOS builds: use repository variable NEXUS_MACOS_DEVELOPER_DIR
  # (e.g. /Applications/Xcode_16.2.app/Contents/Developer) on self-hosted runners
  # that install Xcode outside the default path.
  nexus-swift-macos:
    name: NexusApp (macOS)
    runs-on: [self-hosted, macOS, ARM64, v2, tw]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -n "${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}" ]; then
            XCODE_DIR="${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}"
          else
            # Fall back to the first available Xcode under /Volumes/xcodes.
            XCODE_DIR="$(ls -d /Volumes/xcodes/Xcode_*.app 2>/dev/null | sort -V | tail -1)/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          echo "Selected Xcode: $XCODE_DIR"
          xcode-select -p || true

      - name: Download Metal Toolchain (if missing)
        run: xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -5 || true

      - name: Build NexusApp (Debug)
        run: scripts/swift/build.sh
