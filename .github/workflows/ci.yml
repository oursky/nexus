name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go-fix:
    name: Go Fix Check
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Verify go tool fix produces no diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git ls-files '*.go')
          if [ ${#go_files[@]} -eq 0 ]; then
            echo "No Go files found; skipping go fix check"
            exit 0
          fi

          tmp_diff="$(mktemp)"
          go tool fix -go=go1.24 -diff "${go_files[@]}" >"$tmp_diff"
          if [ -s "$tmp_diff" ]; then
            echo "go tool fix reported changes. Please run: go tool fix -go=go1.24 <files>"
            cat "$tmp_diff"
            exit 1
          fi

  coverage:
    name: Go Coverage (nexus)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build embedded guest-agent binary
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Run full Go test coverage
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-go-coverage
          path: packages/nexus/coverage.out
          retention-days: 7

  ci:
    name: Core CI (linux)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      # Make /dev/kvm accessible to the runner user without needing group
      # membership. On self-hosted runners KVM is typically pre-configured;
      # only attempt the udev rule if /dev/kvm isn't already world-accessible.
      - name: Enable KVM access
        run: scripts/ci/enable-kvm.sh

      # Tools required for rootfs and e2e tests.
      #   squashfs-tools  → unsquashfs (squashfs → rootfs tree)
      #   e2fsprogs       → mkfs.ext4, debugfs (create and modify rootfs image)
      #   rsync           → copy rootfs tree into ext4 image
      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Set up XFS reflink volume for libkrun workspaces
        run: scripts/ci/setup-xfs-reflink.sh

      - name: Prepare libkrun bake cache paths
        run: scripts/ci/prepare-libkrun-cache-env.sh

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v3-${{ runner.os }}-${{ hashFiles('Nexusfile', 'schemas/nexusfile.schema.json', 'packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/cmd/nexus-guest-agent/main.go', 'packages/nexus/cmd/nexus/nexus-libkrun-vm', 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go') }}
          restore-keys: |
            libkrun-baked-v3-${{ runner.os }}-

      - name: Hydrate cached VM assets to host paths
        run: scripts/ci/hydrate-libkrun-cache.sh

      - name: Verify pre-baked VM assets (cache hint)
        run: scripts/ci/verify-vm-assets.sh hint

      # Cache the compiled kernel ELF so we don't rebuild from source on every run.
      # Kernel builds are slow (~10-15 min) and the config rarely changes.
      - name: Restore compiled kernel ELF
        id: kernel-elf-cache
        uses: actions/cache@v4
        with:
          path: packages/nexus/cmd/nexus/assets/vmlinux
          key: nexus-kernel-elf-v1-${{ runner.os }}-${{ hashFiles('scripts/nexus/build-kernel.sh') }}

      # Build the guest-agent binary so the //go:embed directive in
      # embed_agent_linux_amd64.go is satisfied before compiling nexus.
      # This step also builds the kernel ELF (if cache miss) and embeds it.
      - name: Build embedded guest-agent binary
        run: scripts/ci/build-nexus-libkrun.sh

      # Pre-provision libkrun host infrastructure once before the test suite.
      # daemon start auto-provisions on first run; we start it briefly then stop
      # it so that every per-test daemon start finds everything already in place
      # and skips the slow setup path.
      - name: Provision libkrun host (kernel + rootfs)
        run: scripts/ci/provision-libkrun-host.sh

      - name: Verify VM assets after provisioning
        run: scripts/ci/verify-vm-assets.sh required

      - name: Prewarm default-profile baked rootfs (best effort, bounded)
        continue-on-error: true
        run: scripts/ci/prewarm-default-profile.sh

      - name: Refresh baked VM cache contents
        if: always()
        run: scripts/ci/refresh-libkrun-cache.sh

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true
          NEXUS_LIBKRUN_SKIP_BAKE: "1"
          NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
          NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
          NEXUS_VM_KERNEL: /var/lib/nexus/vmlinux.bin
          NEXUS_VM_ROOTFS: /var/lib/nexus/rootfs.ext4
          # Use a small workspace image so mkfs.ext4 finishes in seconds on CI.
          NEXUS_WORKSPACE_IMAGE_MIN_MIB: "512"
          # Limit VM memory to reduce peak RSS when tests run in parallel.
          NEXUS_LIBKRUN_MEM_MIB: "256"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  # Matches hkfc-style macOS builds: use repository variable NEXUS_MACOS_DEVELOPER_DIR
  # (e.g. /Applications/Xcode_16.2.app/Contents/Developer) on self-hosted runners
  # that install Xcode outside the default path.
  nexus-swift-macos:
    name: NexusApp (macOS)
    runs-on: [self-hosted, macOS, ARM64, v2, tw]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -n "${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}" ]; then
            XCODE_DIR="${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}"
          else
            # Fall back to the first available Xcode under /Volumes/xcodes.
            XCODE_DIR="$(ls -d /Volumes/xcodes/Xcode_*.app 2>/dev/null | sort -V | tail -1)/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          echo "Selected Xcode: $XCODE_DIR"
          xcode-select -p || true

      - name: Download Metal Toolchain (if missing)
        run: xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -5 || true

      - name: Build NexusApp (Debug)
        run: scripts/swift/build.sh
