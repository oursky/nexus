name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch/PR when a new push arrives.
# This prevents stale queued runs from blocking GitHub-hosted runner slots.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Heavy libkrun/KVM e2e under packages/nexus/test/e2e/... is run on developer hosts
# (Mac + Linux KVM box), not on GitHub-hosted VMs for every PR — except the slim
# `tui-e2e` job on ubuntu-latest (KVM) below. Use Taskfile `task test:e2e:local` or
# scripts/local/run-linux-e2e.sh / run-mac-e2e.sh for the full suite (see repo README).

jobs:
  lint:
    name: Lint (nexus)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1

      - name: Verify go tool fix produces no diff
        run: bash scripts/ci/go-fix.sh

      - name: Build embedded guest-agent binary (required for embed directive)
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Run golangci-lint
        working-directory: packages/nexus
        run: golangci-lint run ./...

  unit-tests:
    name: Unit Tests (nexus)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build embedded guest-agent binary
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      # Stage libkrun dylibs needed by the //go:embed in embed_libkrun_darwin.go
      # when cross-compiling the darwin/arm64 nexus binary on Linux.
      - name: Stage libkrun dylibs for darwin cross-build
        run: bash scripts/local/build-libkrun-darwin.sh

      # Build cross-platform nexus binary for fat bundle tests.
      - name: Build cross-platform nexus binary (darwin/arm64)
        run: bash scripts/ci/build-cross-nexus-darwin.sh

      - name: Run unit tests with coverage
        env:
          GOTOOLCHAIN: local
        run: scripts/ci/coverage.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-go-coverage
          path: packages/nexus/coverage.out
          retention-days: 1

  # GitHub-hosted Apple Silicon: Go e2e with macOS VM driver (same suite as Linux; vmproof skipped on darwin).
  # Disabled on GitHub CI — run locally: bash scripts/local/run-mac-e2e.sh
  e2e-macos-vm:
    if: false
    name: E2E Tests (macOS / ${{ matrix.shard.name }})
    runs-on: macos-15
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: core
            packages: >-
              ./test/e2e/harness/...
              ./test/e2e/daemon/...
              ./test/e2e/auth/...
              ./test/e2e/fs/...
              ./test/e2e/project/...
              ./test/e2e/cli/...
          - name: vm-heavy
            packages: >-
              ./test/e2e/vmproof/...
              ./test/e2e/workspace/...
              ./test/e2e/pty/...
              ./test/e2e/spotlight/...
    env:
      GOTOOLCHAIN: local
      CI: "true"
      NEXUS_E2E_DRIVER: vm
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_MEM_MIB: "512"
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "512"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "512"
      # Fail fast if a VM doesn't become ready within 90 s instead of the default 3 min.
      # With the subprocess-per-VM fix, boot takes <1 s locally and a few seconds on CI.
      # 90 s gives plenty of headroom while preventing 3-min-per-test hangs on regression.
      NEXUS_READINESS_TIMEOUT_SECONDS: "90"
      NEXUS_E2E_MACOS_PACKAGES: ${{ matrix.shard.packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs (mke2fs)
        run: bash scripts/ci/install-e2fsprogs.sh

      - name: Stage libkrun dylibs (go:embed)
        run: bash scripts/local/build-libkrun-darwin.sh

      - name: Cache macOS VM rootfs
        uses: actions/cache@v4
        with:
          path: ~/.cache/nexus/vm/rootfs.ext4
          key: nexus-macos-vm-rootfs-${{ hashFiles('packages/nexus/internal/infra/runtime/macvm/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**', 'scripts/ci/ensure-macos-e2e-rootfs.sh') }}

      - name: Ensure guest rootfs ext4 for E2E
        run: bash scripts/ci/ensure-macos-e2e-rootfs.sh
        env:
          NEXUS_REPO_ROOT: ${{ github.workspace }}
          XDG_CACHE_HOME: ~/.cache

      - name: Build embedded guest-agent (nexus embed)
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Build nexus + pty-host, codesign, and pre-install gvproxy
        run: bash scripts/ci/build-macos-e2e.sh

      - name: Run Go e2e (vm driver)
        timeout-minutes: 30
        run: bash scripts/ci/run-macos-e2e.sh

      - name: Dump VM serial and gvproxy logs on failure
        if: failure()
        run: bash scripts/ci/dump-macos-vm-logs.sh

  # Full e2e is also run locally on dev Mac + linuxbox; when this job is enabled on
  # Linux with KVM (including GitHub-hosted ubuntu-* when /dev/kvm is available), it is
  # the canonical CI gate for the VM-backed suite.
  #
  # Disabled on GitHub CI — run on a Linux host: bash scripts/local/run-linux-e2e.sh
  e2e:
    if: false
    name: E2E Tests (linux / ${{ matrix.shard.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard:
          # ── Core lightweight shard (merged auth+daemon+fs+project+spotlight+pty) ──
          - name: core-light
            packages: ./test/e2e/auth ./test/e2e/daemon ./test/e2e/fs ./test/e2e/project ./test/e2e/spotlight ./test/e2e/pty
            go_p: 2
            go_parallel: 2
            go_run: ""
            go_timeout: 8m
            step_timeout_minutes: 10
          # ── VM-integration shard (all vmproof tests in one shard) ──────
          # Merged from vmproof-core + vmproof-heavy to avoid running two
          # shard jobs concurrently: parallel shards double the active VM
          # count, causing resource exhaustion on CI machines and making
          # WaitForWorkspaceReady block indefinitely. A single shard with
          # p=2 keeps at most 2 VMs live at once.
          - name: vmproof
            packages: ./test/e2e/vmproof
            go_p: 2
            go_parallel: 2
            go_run: ""
            go_timeout: 8m
            step_timeout_minutes: 10
          # ── Workspace shards (split by fork vs core) ───────────────────
          - name: workspace-core
            packages: ./test/e2e/workspace
            go_p: 2
            go_parallel: 2
            go_run: "TestWorkspaceIdempotency|TestProjectRepoDedup|TestWorkspaceLifecycle|TestProtocol_|TestErrors_|TestLifecycle_"
            go_timeout: 8m
            step_timeout_minutes: 10
          - name: workspace-fork
            packages: ./test/e2e/workspace
            go_p: 2
            go_parallel: 2
            go_run: "TestWorkspaceRestore|TestWorkspaceFork|TestFork_"
            go_timeout: 8m
            step_timeout_minutes: 10
          # ── CLI shard (merged; parallelism replaces serial bottleneck) ──
          - name: cli
            packages: ./test/e2e/cli
            go_p: 2
            go_parallel: 2
            go_run: ""
            go_timeout: 15m
            step_timeout_minutes: 20
    env:
      CI: true
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
      NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
      NEXUS_VM_KERNEL: /var/lib/nexus/vmlinux.bin
      NEXUS_VM_ROOTFS: /var/lib/nexus/rootfs.ext4
      # GitHub-hosted runners have ~14 GB disk; parallel E2E VMs each allocate a
      # workspace ext4 sized from this minimum — 512 MiB × many workspaces
      # exhausts the host and yields corrupt images / guest I/O errors.
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "128"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "128"
      NEXUS_LIBKRUN_MEM_MIB: "256"
      NEXUS_PASST_PATH: /tmp/passt-patched

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest

      # Make /dev/kvm accessible to the runner user without needing group
      # membership when it is not already world-accessible (typical on GitHub-hosted Linux).
      - name: Enable KVM access
        run: scripts/ci/enable-kvm.sh

      # Tools required for rootfs and e2e tests.
      #   genext2fs       → build ext4 images from the Ubuntu minimal tar.xz rootfs
      #   e2fsprogs       → mkfs.ext4 and fallback image tooling
      #   rsync           → copy rootfs tree into ext4 image
      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Set up XFS reflink volume for libkrun workspaces
        run: scripts/ci/setup-xfs-reflink.sh

      - name: Prepare libkrun bake cache paths
        run: scripts/ci/prepare-libkrun-cache-env.sh

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v6-${{ runner.os }}-${{ hashFiles('Nexusfile', 'schemas/nexusfile.schema.json', 'packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/internal/infra/runtime/libkrun/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**', 'packages/nexus/cmd/nexus/nexus-libkrun-vm', 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go') }}
          restore-keys: |
            libkrun-baked-v6-${{ runner.os }}-

      - name: Hydrate cached VM assets to host paths
        timeout-minutes: 5
        run: scripts/ci/hydrate-libkrun-cache.sh

      - name: Verify pre-baked VM assets (cache hint)
        run: scripts/ci/verify-vm-assets.sh hint

      # Build the guest-agent binary so the //go:embed directive in
      # embed_agent_linux_amd64.go is satisfied before compiling nexus.
      # This step also builds the kernel ELF (if cache miss) and embeds it.
      - name: Build embedded guest-agent binary
        timeout-minutes: 5
        run: scripts/ci/build-nexus-libkrun.sh

      # Stage darwin dylibs required by //go:embed in embed_libkrun_darwin.go
      # when cross-compiling the darwin/arm64 nexus binary on Linux.
      - name: Stage libkrun dylibs for darwin cross-build
        run: bash scripts/local/build-libkrun-darwin.sh

      # Build cross-platform nexus binary for fat bundle tests.
      # The bundle exporter embeds both linux-amd64 and darwin-arm64 binaries.
      - name: Build cross-platform nexus binary (darwin/arm64)
        run: bash scripts/ci/build-cross-nexus-darwin.sh

      - name: Build patched passt for containerized CI
        timeout-minutes: 5
        run: bash scripts/ci/build-passt.sh

      # Pre-provision libkrun host infrastructure once before the test suite.
      # daemon start auto-provisions on first run; we start it briefly then stop
      # it so that every per-test daemon start finds everything already in place
      # and skips the slow setup path.
      - name: Provision libkrun host (kernel + rootfs)
        timeout-minutes: 5
        run: scripts/ci/provision-libkrun-host.sh

      - name: Verify VM assets after provisioning
        run: scripts/ci/verify-vm-assets.sh required

      - name: Probe runner VM network forwarding
        id: runner-network-probe
        continue-on-error: true
        run: scripts/ci/probe-runner-network.sh

      - name: Prewarm default-profile baked rootfs (best effort, bounded)
        if: steps.runner-network-probe.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 5
        run: scripts/ci/prewarm-default-profile.sh
        env:
          NEXUS_PASST_PATH: /tmp/passt-patched

      - name: Refresh baked VM cache contents
        if: always()
        timeout-minutes: 5
        run: scripts/ci/refresh-libkrun-cache.sh

      - name: Bootstrap e2e SSH profile
        timeout-minutes: 5
        run: bash scripts/ci/e2e-ssh-bootstrap.sh

      - name: Setup host config drive fixtures
        run: scripts/ci/setup-host-config-fixtures.sh

      - name: Start SSH agent (vmproof only)
        if: matrix.shard.name == 'vmproof'
        run: bash scripts/ci/start-ssh-agent.sh

      - name: Run e2e tests (${{ matrix.shard.name }})
        timeout-minutes: ${{ matrix.shard.step_timeout_minutes }}
        env:
          GO_P: ${{ matrix.shard.go_p }}
          GO_PARALLEL: ${{ matrix.shard.go_parallel }}
          GO_RUN: ${{ matrix.shard.go_run }}
          GO_TIMEOUT: ${{ matrix.shard.go_timeout }}
          GO_PACKAGES: ${{ matrix.shard.packages }}
        run: bash scripts/ci/run-linux-e2e.sh

      - name: Dump VM diagnostics on failure
        if: failure()
        run: bash scripts/ci/dump-linux-vm-diagnostics.sh

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            **/test-results/
            **/coverage/
          retention-days: 1

  # TUI e2e starts nexusd with libkrun when NEXUS_VM_KERNEL + NEXUS_VM_ROOTFS are set
  # (same driver selection as test/e2e/harness). Runs on GitHub-hosted ubuntu-latest
  # with KVM + the same libkrun prep chain as disabled job `e2e` (no shard matrix;
  # no SSH profile / vmproof-only steps).
  tui-e2e:
    name: TUI E2E (ubuntu-latest / libkrun VM)
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CI: true
      GOTOOLCHAIN: local
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
      NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
      NEXUS_VM_KERNEL: /var/lib/nexus/vmlinux.bin
      NEXUS_VM_ROOTFS: /var/lib/nexus/rootfs.ext4
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "128"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "128"
      NEXUS_LIBKRUN_MEM_MIB: "256"
      NEXUS_PASST_PATH: /tmp/passt-patched

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Enable KVM access
        run: scripts/ci/enable-kvm.sh

      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Set up XFS reflink volume for libkrun workspaces
        run: scripts/ci/setup-xfs-reflink.sh

      - name: Prepare libkrun bake cache paths
        run: scripts/ci/prepare-libkrun-cache-env.sh

      - name: Restore pre-baked libkrun VM assets
        id: libkrun-baked-cache
        timeout-minutes: 5
        uses: actions/cache@v4
        with:
          path: ${{ env.LIBKRUN_BAKED_CACHE_DIR }}
          key: libkrun-baked-v6-${{ runner.os }}-${{ hashFiles('Nexusfile', 'schemas/nexusfile.schema.json', 'packages/nexus/internal/infra/runtime/libkrun/bake.go', 'packages/nexus/internal/infra/runtime/libkrun/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**', 'packages/nexus/cmd/nexus/nexus-libkrun-vm', 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go') }}
          restore-keys: |
            libkrun-baked-v6-${{ runner.os }}-

      - name: Hydrate cached VM assets to host paths
        timeout-minutes: 5
        run: scripts/ci/hydrate-libkrun-cache.sh

      - name: Verify pre-baked VM assets (cache hint)
        run: scripts/ci/verify-vm-assets.sh hint

      - name: Build embedded guest-agent + libkrun nexus (Linux CI)
        timeout-minutes: 5
        run: scripts/ci/build-nexus-libkrun.sh

      - name: Build patched passt for containerized CI
        timeout-minutes: 5
        run: bash scripts/ci/build-passt.sh

      - name: Provision libkrun host (kernel + rootfs)
        timeout-minutes: 5
        run: scripts/ci/provision-libkrun-host.sh

      - name: Verify VM assets after provisioning
        run: scripts/ci/verify-vm-assets.sh required

      - name: Probe runner VM network forwarding
        id: runner-network-probe
        continue-on-error: true
        run: scripts/ci/probe-runner-network.sh

      - name: Prewarm default-profile baked rootfs (best effort, bounded)
        if: steps.runner-network-probe.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 5
        run: scripts/ci/prewarm-default-profile.sh
        env:
          NEXUS_PASST_PATH: /tmp/passt-patched

      - name: Refresh baked VM cache contents
        if: always()
        timeout-minutes: 5
        run: scripts/ci/refresh-libkrun-cache.sh

      # NEXUS_VM_KERNEL / NEXUS_VM_ROOTFS (job env) select libkrun in test/e2e/tui (see tuiDaemonDriverArgs).
      # Outer timeout(1) is slightly above go test -timeout so the runner reports hard kills cleanly on GH.
      - name: Run TUI e2e (VM driver)
        timeout-minutes: 22
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          timeout 19m sudo -E env \
            "PATH=$PATH" \
            "HOME=$HOME" \
            "CI=$CI" \
            "GOTOOLCHAIN=${GOTOOLCHAIN:-}" \
            "NEXUS_E2E_BINARY=${NEXUS_E2E_BINARY:-}" \
            "NEXUS_VM_KERNEL=${NEXUS_VM_KERNEL}" \
            "NEXUS_VM_ROOTFS=${NEXUS_VM_ROOTFS}" \
            "NEXUS_LIBKRUN_SKIP_BAKE=${NEXUS_LIBKRUN_SKIP_BAKE}" \
            "NEXUS_LIBKRUN_BAKE_TIMEOUT=${NEXUS_LIBKRUN_BAKE_TIMEOUT}" \
            "NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS=${NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS}" \
            "NEXUS_WORKSPACE_IMAGE_MIN_MIB=${NEXUS_WORKSPACE_IMAGE_MIN_MIB}" \
            "NEXUS_RUNNER_ROOTFS_MIN_MIB=${NEXUS_RUNNER_ROOTFS_MIN_MIB}" \
            "NEXUS_LIBKRUN_MEM_MIB=${NEXUS_LIBKRUN_MEM_MIB}" \
            "NEXUS_PASST_PATH=${NEXUS_PASST_PATH}" \
            go test -tags e2e -count=1 -timeout=17m -v ./test/e2e/tui/...

      - name: Dump VM diagnostics on failure
        if: failure()
        run: bash scripts/ci/dump-linux-vm-diagnostics.sh

  # Matches hkfc-style macOS builds: use repository variable NEXUS_MACOS_DEVELOPER_DIR
  # (e.g. /Applications/Xcode_16.2.app/Contents/Developer) on self-hosted runners
  # that install Xcode outside the default path.
  #
  # Paused — macOS app development is on hold; keep job skeleton for easy re-enable.
  nexus-swift-macos:
    name: NexusApp (macOS)
    if: false  # disabled: requires self-hosted runner with Xcode; run manually
    runs-on: [self-hosted, macOS, ARM64, v2, tw]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        env:
          NEXUS_MACOS_DEVELOPER_DIR: ${{ vars.NEXUS_MACOS_DEVELOPER_DIR }}
        run: bash scripts/ci/select-xcode.sh

      - name: Download Metal Toolchain (if missing)
        run: xcodebuild -downloadComponent MetalToolchain 2>&1 | tail -5 || true

      - name: Build NexusApp (Debug)
        run: scripts/swift/build.sh
