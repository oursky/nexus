name: XCUITests

on:
  push:
    branches: [xcui-fixture-rewrite, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  xcuitests:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Lima
        run: brew install lima lima-additional-guestagents

      - name: Start Lima VM
        run: limactl start --name=xcui-vm scripts/lima/xcui-vm.yaml --tty=false

      - name: Build Nexus daemon in VM
        run: |
          limactl shell xcui-vm -- bash -c "
            export PATH=\$PATH:/usr/local/go/bin
            cd /Users/runner/work/nexus/nexus
            go build -o /tmp/nexusd ./packages/nexus/cmd/nexusd
          "

      - name: Start Nexus daemon in VM
        run: |
          limactl shell xcui-vm -- bash -c "
            nohup /tmp/nexusd serve --port 7777 > /tmp/nexusd.log 2>&1 &
            sleep 3
            nc -z localhost 7777 || (cat /tmp/nexusd.log && exit 1)
          "

      - name: Clone fixture repos
        run: bash scripts/fixtures/setup.sh

      - name: Load fixture paths
        run: |
          if [ -f scripts/fixtures/.env ]; then
            cat scripts/fixtures/.env >> "$GITHUB_ENV"
          fi

      - name: Run XCUITests
        run: bash scripts/test-xcui.sh --no-tunnel

      - name: Write Step Summary
        if: always()
        run: |
          BUILD_DIR="packages/nexus-swift/.build/xcresults"
          INDEX=$(ls "${BUILD_DIR}/index/"*.json 2>/dev/null | sort | tail -1)
          if [[ -z "$INDEX" ]]; then
            echo "## NexusUITests" >> "$GITHUB_STEP_SUMMARY"
            echo "No index file found — tests may not have run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python3 - "$INDEX" >> "$GITHUB_STEP_SUMMARY" <<'PYEOF'
          import sys, json
          index_path = sys.argv[1]
          with open(index_path) as f:
              d = json.load(f)
          run_id = d['runId']
          s = d['summary']
          tests = d['tests']
          lines = [
              f'## NexusUITests — `{run_id}`',
              '',
              f'**{s["passed"]} passed · {s["failed"]} failed · {s["skipped"]} skipped · {s["durationSec"]:.1f}s**',
              '',
              '| Test | Status | Duration | Screenshots |',
              '|------|--------|----------|-------------|',
          ]
          for t in tests:
              ss_links = ' '.join(f'`{sc["name"]}`' for sc in t['screenshots']) or '—'
              lines.append(f'| `{t["name"]}` | {t["statusIcon"]} | {t["durationSec"]:.1f}s | {ss_links} |')
          lines.append('')
          print('\n'.join(lines))
          PYEOF

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusUITests-xcresult
          path: packages/nexus-swift/.build/xcresults/*.xcresult
          if-no-files-found: warn

      - name: Upload report and index
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusUITests-report
          path: |
            packages/nexus-swift/.build/xcresults/reports/
            packages/nexus-swift/.build/xcresults/index/
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NexusUITests-screenshots
          path: packages/nexus-swift/.build/xcresults/screenshots/
          if-no-files-found: warn
