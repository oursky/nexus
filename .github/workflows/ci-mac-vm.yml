# Optional manual run of macOS VM E2E (same as ci.yml e2e-macos-vm job).
name: macOS VM E2E (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-macos-vm:
    name: E2E Tests (macOS / vm)
    runs-on: macos-14
    timeout-minutes: 60
    env:
      GOTOOLCHAIN: local
      CI: "true"
      NEXUS_E2E_DRIVER: vm
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_MEM_MIB: "256"
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "512"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "512"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs (mke2fs)
        run: brew install e2fsprogs

      - name: Stage libkrun dylibs (go:embed)
        run: bash scripts/local/build-libkrun-darwin.sh

      - name: Cache macOS VM rootfs
        uses: actions/cache@v4
        with:
          path: ~/.cache/nexus/vm/rootfs.ext4
          key: nexus-macos-vm-rootfs-${{ hashFiles('packages/nexus/internal/infra/runtime/macvm/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**') }}

      - name: Ensure guest rootfs ext4 for E2E
        run: bash scripts/ci/ensure-macos-e2e-rootfs.sh

      - name: Build embedded guest-agent (nexus embed)
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Run Go e2e (vm driver)
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          export NEXUS_VM_ROOTFS="${NEXUS_VM_ROOTFS:-$HOME/.cache/nexus/vm/rootfs.ext4}"
          export XDG_CACHE_HOME="${XDG_CACHE_HOME:-$HOME/.cache}"
          go test -tags e2e -count=1 -timeout=45m -v -p=2 -parallel=2 \
            ./test/e2e/harness/... \
            ./test/e2e/daemon/... \
            ./test/e2e/auth/... \
            ./test/e2e/fs/... \
            ./test/e2e/project/... \
            ./test/e2e/vmproof/... \
            ./test/e2e/workspace/... \
            ./test/e2e/cli/... \
            ./test/e2e/pty/... \
            ./test/e2e/spotlight/...
