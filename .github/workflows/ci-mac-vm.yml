# macOS VM smoke tests on GitHub-hosted runners only (no self-hosted).
# Canonical remote: git@github.com:oursky/nexus.git — checkout pins repository oursky/nexus.
name: macOS VM smoke

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci-mac-vm.yml"
      - "packages/nexus/**"
      - "scripts/ci/mac-vm-smoke.sh"
  pull_request:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci-mac-vm.yml"
      - "packages/nexus/**"
      - "scripts/ci/mac-vm-smoke.sh"

permissions:
  contents: read

jobs:
  mac-vm-smoke:
    name: macOS libkrun workspace smoke
    # Apple Silicon, GitHub-hosted (public pool).
    runs-on: macos-14
    timeout-minutes: 45
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout oursky/nexus (public GitHub)
        uses: actions/checkout@v4
        with:
          repository: oursky/nexus
          ref: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs (mke2fs for rootfs creation)
        run: brew install e2fsprogs

      - name: Cache macOS VM rootfs
        id: rootfs-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/nexus/vm/rootfs.ext4
          key: nexus-macos-vm-rootfs-${{ hashFiles('packages/nexus/internal/infra/runtime/macvm/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**') }}

      - name: Run mac-vm smoke script
        run: scripts/ci/mac-vm-smoke.sh
        env:
          NEXUS_REPO_ROOT: ${{ github.workspace }}
          XDG_CACHE_HOME: ~/.cache
