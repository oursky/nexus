# Optional manual run of the macOS VM smoke test on GitHub-hosted macos-14.
# PR / push CI runs the same job from .github/workflows/ci.yml (mac-vm-smoke).
name: macOS VM smoke (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mac-vm-smoke:
    name: macOS libkrun workspace smoke
    runs-on: macos-14
    timeout-minutes: 45
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs (mke2fs for rootfs creation)
        run: brew install e2fsprogs

      - name: Stage libkrun dylibs (go:embed)
        run: bash scripts/local/build-libkrun-darwin.sh

      - name: Cache macOS VM rootfs
        uses: actions/cache@v4
        with:
          path: ~/.cache/nexus/vm/rootfs.ext4
          key: nexus-macos-vm-rootfs-${{ hashFiles('packages/nexus/internal/infra/runtime/macvm/bake_version.go', 'packages/nexus/cmd/nexus-guest-agent/**') }}

      - name: Run mac-vm smoke script
        run: scripts/ci/mac-vm-smoke.sh
        env:
          NEXUS_REPO_ROOT: ${{ github.workspace }}
          XDG_CACHE_HOME: ~/.cache
