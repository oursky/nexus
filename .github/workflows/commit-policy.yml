name: Commit Policy

on:
  pull_request:
    branches: [main, develop]

jobs:
  semantic-commits:
    name: Semantic Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR commit messages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TYPES="feat|fix|docs|chore|refactor|test|ci|build|perf|revert"
          PATTERN="^(${TYPES})(\(.+\))?(!)?: .+"
          ERRORS=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qP "$PATTERN"; then
              echo "FAIL: $msg"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git log --format="%s" "$BASE_SHA".."$HEAD_SHA")
          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Commit messages must follow the Conventional Commits format:"
            echo "  <type>(<scope>): <description>"
            echo "  Allowed types: ${TYPES//|/, }"
            exit 1
          fi
          echo "All commit messages are valid."
