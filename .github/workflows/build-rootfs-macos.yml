name: Build macOS VM rootfs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Rootfs version number (integer, e.g. 1)"
        required: true
        default: "1"
  push:
    tags:
      - "rootfs-macos-arm64-v*"

permissions:
  contents: write   # needed to create releases + upload assets

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Build the arm64 Ubuntu rootfs on Linux (no QEMU/Docker needed).
  # Uses mke2fs -d to embed a staging directory into an ext4 image directly.
  # ──────────────────────────────────────────────────────────────────────────
  build-rootfs:
    name: Build arm64 Ubuntu rootfs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      sha256: ${{ steps.compress.outputs.sha256 }}

    steps:
      - name: Checkout oursky/nexus
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs (mkfs.ext4 / mke2fs)
        run: sudo apt-get install -y e2fsprogs

      - name: Build nexus-guest-agent (linux/arm64 static binary)
        working-directory: packages/nexus
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath -ldflags='-s -w' \
            -o /tmp/nexus-guest-agent \
            ./cmd/nexus-guest-agent/
          echo "guest-agent: $(ls -lh /tmp/nexus-guest-agent)"

      - name: Download Ubuntu 22.04 arm64 minimal rootfs tarball
        run: |
          URL="https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-arm64-root.tar.xz"
          echo "Downloading $URL"
          curl -fsSL --retry 3 -o /tmp/ubuntu-arm64-root.tar.xz "$URL"
          ls -lh /tmp/ubuntu-arm64-root.tar.xz

      - name: Build rootfs staging directory
        run: |
          STAGING="/tmp/rootfs-staging"
          mkdir -p "$STAGING"

          echo "Extracting Ubuntu minimal rootfs..."
          sudo tar --no-same-owner -xJf /tmp/ubuntu-arm64-root.tar.xz -C "$STAGING"
          sudo chown -R $(id -u):$(id -g) "$STAGING"

          # Install nexus-guest-agent as PID-1 init
          mkdir -p "$STAGING/usr/local/bin"
          cp /tmp/nexus-guest-agent "$STAGING/usr/local/bin/nexus-guest-agent"
          chmod 0755 "$STAGING/usr/local/bin/nexus-guest-agent"

          # Workspace virtiofs mount point
          mkdir -p "$STAGING/workspace"

          # Ensure /etc/fstab references the virtio block device
          if ! grep -q '/dev/vda' "$STAGING/etc/fstab" 2>/dev/null; then
            echo "/dev/vda / ext4 rw,relatime 0 1" | tee -a "$STAGING/etc/fstab"
          fi

          echo "Staging tree (top-level):"
          ls -la "$STAGING"
          echo "guest-agent installed:"
          ls -lh "$STAGING/usr/local/bin/nexus-guest-agent"

      - name: Create 10 GiB sparse ext4 image (mke2fs -d)
        run: |
          echo "Creating sparse ext4 image..."
          sudo mke2fs -F -t ext4 -L nexus-root \
            -d /tmp/rootfs-staging \
            /tmp/rootfs-macos-arm64.ext4 10G
          ls -lh /tmp/rootfs-macos-arm64.ext4

      - name: Compress rootfs
        id: compress
        run: |
          echo "Compressing with gzip -9..."
          gzip -9 -k /tmp/rootfs-macos-arm64.ext4 -c > /tmp/rootfs-macos-arm64.ext4.gz
          ls -lh /tmp/rootfs-macos-arm64.ext4.gz
          sha256sum /tmp/rootfs-macos-arm64.ext4.gz | tee /tmp/rootfs-macos-arm64.sha256
          echo "sha256=$(awk '{print $1}' /tmp/rootfs-macos-arm64.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-macos-arm64
          path: |
            /tmp/rootfs-macos-arm64.ext4.gz
            /tmp/rootfs-macos-arm64.sha256
          retention-days: 7

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="rootfs-macos-arm64-v${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building rootfs tag: $TAG"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Smoke-test the rootfs on a real macOS Apple Silicon runner.
  # Downloads the artifact from job 1, pre-populates the cache, then runs
  # the full workspace lifecycle smoke test (create/start/exec/destroy).
  # ──────────────────────────────────────────────────────────────────────────
  test-rootfs:
    name: Smoke-test rootfs on macOS Apple Silicon
    runs-on: macos-14
    needs: build-rootfs
    timeout-minutes: 45

    steps:
      - name: Checkout oursky/nexus
        uses: actions/checkout@v4
        with:
          repository: oursky/nexus
          ref: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Download smolvm dylibs (libkrun)
        run: bash scripts/local/build-libkrun-darwin.sh

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-macos-arm64
          path: ${{ runner.temp }}/rootfs-artifact/

      - name: Pre-populate rootfs cache (skip on-demand download in smoke test)
        run: |
          SMOKE_STATE="${{ runner.temp }}/nexus-mac-vm-smoke-state"
          mkdir -p "$SMOKE_STATE/cache/nexus/vm"
          gzip -d -c "${{ runner.temp }}/rootfs-artifact/rootfs-macos-arm64.ext4.gz" \
            > "$SMOKE_STATE/cache/nexus/vm/rootfs.ext4"
          ls -lh "$SMOKE_STATE/cache/nexus/vm/rootfs.ext4"

      - name: Run smoke test (workspace create/start/exec/destroy)
        env:
          NEXUS_MAC_VM_STATE: ${{ runner.temp }}/nexus-mac-vm-smoke-state
          # Set static token so daemon skips keychain lookup in headless CI
          NEXUS_DAEMON_TOKEN: nexus-ci-mac-vm-test
        run: bash scripts/ci/mac-vm-smoke.sh

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Publish GitHub prerelease only after the macOS smoke test passes.
  # ──────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rootfs, test-rootfs]

    steps:
      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-macos-arm64
          path: /tmp/

      - name: Create GitHub release + upload asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.build-rootfs.outputs.tag }}"
          SHA256="${{ needs.build-rootfs.outputs.sha256 }}"

          gh release create "$TAG" \
            --repo oursky/nexus \
            --prerelease \
            --title "macOS VM rootfs $TAG" \
            --notes "Pre-baked arm64 Ubuntu rootfs for macOS libkrun VM workspaces.

          SHA256: \`${SHA256}\`

          Built from: ${{ github.sha }}" \
            /tmp/rootfs-macos-arm64.ext4.gz \
            /tmp/rootfs-macos-arm64.sha256

          echo "Release created: https://github.com/oursky/nexus/releases/tag/$TAG"
          echo "Update macvm/bake_version.go: RootFSSHA256 = \"${SHA256}\""
