name: Job - CD

on:
  workflow_call:

jobs:
  release:
    name: Determine release version
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          latest_tag_before=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          pnpm exec semantic-release --json > /tmp/sr-result.json 2> /tmp/sr-log.txt || true
          cat /tmp/sr-log.txt
          
          latest_tag_after=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          version=""
          if [ -f /tmp/sr-result.json ] && [ -s /tmp/sr-result.json ]; then
            if command -v jq &> /dev/null; then
              version=$(jq -r '.nextRelease.version // empty' /tmp/sr-result.json 2>/dev/null || true)
            fi
            if [ -z "$version" ]; then
              version=$(grep -o '"version":"[^"]*"' /tmp/sr-result.json | head -1 | cut -d'"' -f4 || true)
            fi
          fi
          
          if [ -z "$version" ] && [ "$latest_tag_before" != "$latest_tag_after" ] && [ -n "$latest_tag_after" ]; then
            version=$(echo "$latest_tag_after" | sed 's/^v//')
          fi
          
          if [ -n "$version" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            commit_count=$(git rev-list --count HEAD)
            version="${commit_count}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.semantic.outputs.released == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build binaries
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          VERSION="${{ steps.semantic.outputs.version }}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${VERSION}"
          
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-amd64 ./cmd/nexus-guest-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-amd64 ./cmd/nexus
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/pty-host-linux-amd64 ./cmd/pty-host
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-arm64 ./cmd/nexus-guest-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-arm64 ./cmd/nexus
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/pty-host-linux-arm64 ./cmd/pty-host

      - name: Create checksums
        if: steps.semantic.outputs.released == 'true'
        run: |
          cd dist
          sha256sum nexus-linux-amd64 nexus-linux-arm64 pty-host-linux-amd64 pty-host-linux-arm64 > sha256sums.txt

      - name: Upload binaries to GitHub Release
        if: steps.semantic.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.semantic.outputs.tag }}"
          gh release upload "$tag" \
            dist/nexus-linux-amd64 \
            dist/nexus-linux-arm64 \
            dist/pty-host-linux-amd64 \
            dist/pty-host-linux-arm64 \
            dist/sha256sums.txt \
            --clobber

  # Pre-baked arm64 Ubuntu guest images (same layout: guest-agent as /usr/local/bin/nexus-guest-agent).
  # Uploaded to the same semantic-release tag as Nexus binaries.
  rootfs-linux-arm64:
    name: Release asset — Linux arm64 guest rootfs
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Build nexus-guest-agent (linux/arm64)
        working-directory: packages/nexus
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' \
            -o /tmp/nexus-guest-agent ./cmd/nexus-guest-agent/

      - name: Download Ubuntu 22.04 arm64 root tarball
        run: |
          curl -fsSL --retry 3 -o /tmp/ubuntu-arm64-root.tar.xz \
            "https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-arm64-root.tar.xz"

      - name: Create ext4 + compress + checksum
        run: |
          set -euo pipefail
          STAGING="/tmp/rootfs-staging"
          mkdir -p "$STAGING"
          sudo tar --no-same-owner -xJf /tmp/ubuntu-arm64-root.tar.xz -C "$STAGING"
          sudo chown -R "$(id -u):$(id -g)" "$STAGING"
          mkdir -p "$STAGING/usr/local/bin"
          cp /tmp/nexus-guest-agent "$STAGING/usr/local/bin/nexus-guest-agent"
          chmod 0755 "$STAGING/usr/local/bin/nexus-guest-agent"
          mkdir -p "$STAGING/workspace"
          if ! grep -q '/dev/vda' "$STAGING/etc/fstab" 2>/dev/null; then
            echo "/dev/vda / ext4 rw,relatime 0 1" | tee -a "$STAGING/etc/fstab"
          fi
          sudo mke2fs -F -t ext4 -L nexus-root -d "$STAGING" /tmp/rootfs-linux-arm64.ext4 10G
          gzip -9 -c /tmp/rootfs-linux-arm64.ext4 > /tmp/rootfs-linux-arm64.ext4.gz
          sha256sum /tmp/rootfs-linux-arm64.ext4.gz | tee /tmp/rootfs-linux-arm64.ext4.gz.sha256

      - name: Upload rootfs to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          gh release upload "$tag" \
            /tmp/rootfs-linux-arm64.ext4.gz \
            /tmp/rootfs-linux-arm64.ext4.gz.sha256 \
            --repo "${{ github.repository }}" \
            --clobber

  rootfs-macos-guest:
    name: Release asset — macOS libkrun guest rootfs
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Install e2fsprogs
        run: brew install e2fsprogs

      - name: Build nexus-guest-agent (linux/arm64)
        working-directory: packages/nexus
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' \
            -o /tmp/nexus-guest-agent ./cmd/nexus-guest-agent/

      - name: Download Ubuntu 22.04 arm64 root tarball
        run: |
          curl -fsSL --retry 3 -o /tmp/ubuntu-arm64-root.tar.xz \
            "https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-arm64-root.tar.xz"

      - name: Create ext4 + compress + checksum
        run: |
          set -euo pipefail
          MKE2FS="$(command -v mke2fs || true)"
          if [[ -z "$MKE2FS" ]]; then
            MKE2FS="$(ls /opt/homebrew/opt/e2fsprogs/sbin/mke2fs 2>/dev/null || ls /usr/local/opt/e2fsprogs/sbin/mke2fs)"
          fi
          if [[ -z "$MKE2FS" || ! -x "$MKE2FS" ]]; then
            echo "ERROR: mke2fs not found (brew install e2fsprogs)" >&2
            exit 1
          fi
          STAGING="/tmp/rootfs-staging"
          mkdir -p "$STAGING"
          sudo tar --no-same-owner -xJf /tmp/ubuntu-arm64-root.tar.xz -C "$STAGING"
          sudo chown -R "$(id -u):$(id -g)" "$STAGING"
          mkdir -p "$STAGING/usr/local/bin"
          cp /tmp/nexus-guest-agent "$STAGING/usr/local/bin/nexus-guest-agent"
          chmod 0755 "$STAGING/usr/local/bin/nexus-guest-agent"
          mkdir -p "$STAGING/workspace"
          if ! grep -q '/dev/vda' "$STAGING/etc/fstab" 2>/dev/null; then
            echo "/dev/vda / ext4 rw,relatime 0 1" | tee -a "$STAGING/etc/fstab"
          fi
          "$MKE2FS" -F -t ext4 -L nexus-root -d "$STAGING" /tmp/rootfs-macos-arm64.ext4 10G
          gzip -9 -c /tmp/rootfs-macos-arm64.ext4 > /tmp/rootfs-macos-arm64.ext4.gz
          shasum -a 256 /tmp/rootfs-macos-arm64.ext4.gz | tee /tmp/rootfs-macos-arm64.ext4.gz.sha256

      - name: Upload rootfs to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          gh release upload "$tag" \
            /tmp/rootfs-macos-arm64.ext4.gz \
            /tmp/rootfs-macos-arm64.ext4.gz.sha256 \
            --repo "${{ github.repository }}" \
            --clobber
