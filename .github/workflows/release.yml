name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          output=$(pnpm exec semantic-release --json 2>&1 || true)
          echo "$output"
          if echo "$output" | jq -e '.nextRelease.version' >/dev/null 2>&1; then
            version=$(echo "$output" | jq -r '.nextRelease.version')
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.semantic.outputs.released == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build guest agent (linux/amd64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-amd64 \
            ./cmd/nexus-guest-agent

      - name: Build nexus (linux/amd64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-amd64 \
            ./cmd/nexus

      - name: Build nexus (linux/arm64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-arm64 \
            ./cmd/nexus-guest-agent
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-arm64 \
            ./cmd/nexus

      - name: Build nexus (darwin/arm64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-darwin-arm64 \
            ./cmd/nexus

      - name: Create checksums
        if: steps.semantic.outputs.released == 'true'
        run: |
          cd dist
          sha256sum nexus-linux-amd64 nexus-linux-arm64 nexus-darwin-arm64 > sha256sums.txt
          cat sha256sums.txt

      - name: Upload assets to GitHub Release
        if: steps.semantic.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.semantic.outputs.tag }}"
          gh release upload "$tag" \
            dist/nexus-linux-amd64 \
            dist/nexus-linux-arm64 \
            dist/nexus-darwin-arm64 \
            dist/sha256sums.txt \
            --clobber
