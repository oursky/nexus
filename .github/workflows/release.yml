name: Release

on:
  push:
    branches: [main, test-cd]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # Get the latest tag before running semantic-release
          latest_tag_before=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag before: $latest_tag_before"
          
          # Run semantic-release and capture JSON result
          pnpm exec semantic-release --json > /tmp/sr-result.json 2> /tmp/sr-log.txt || true
          cat /tmp/sr-log.txt
          
          # Get the latest tag after running semantic-release
          latest_tag_after=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag after: $latest_tag_after"
          
          # Extract version from the JSON result
          version=""
          if [ -f /tmp/sr-result.json ] && [ -s /tmp/sr-result.json ]; then
            if command -v jq &> /dev/null; then
              version=$(jq -r '.nextRelease.version // empty' /tmp/sr-result.json 2>/dev/null || true)
            fi
            if [ -z "$version" ]; then
              version=$(grep -o '"version":"[^"]*"' /tmp/sr-result.json | head -1 | cut -d'"' -f4 || true)
            fi
          fi
          
          # Fallback: if a new tag was created, extract version from it
          if [ -z "$version" ] && [ "$latest_tag_before" != "$latest_tag_after" ] && [ -n "$latest_tag_after" ]; then
            version=$(echo "$latest_tag_after" | sed 's/^v//')
            echo "Detected new tag: $latest_tag_after, version: $version"
          fi
          
          if [ -n "$version" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "Semantic release: v$version"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new release"
          fi

      - name: Set up Go
        if: steps.semantic.outputs.released == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Build guest agent (linux/amd64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-amd64 \
            ./cmd/nexus-guest-agent

      - name: Build nexus (linux/amd64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-amd64 \
            ./cmd/nexus

      - name: Build nexus (linux/arm64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o cmd/nexus/agent-linux-arm64 \
            ./cmd/nexus-guest-agent
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-linux-arm64 \
            ./cmd/nexus

      - name: Build nexus (darwin/arm64)
        if: steps.semantic.outputs.released == 'true'
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ steps.semantic.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-darwin-arm64 \
            ./cmd/nexus

      - name: Create checksums
        if: steps.semantic.outputs.released == 'true'
        run: |
          cd dist
          sha256sum nexus-linux-amd64 nexus-linux-arm64 nexus-darwin-arm64 > sha256sums.txt
          cat sha256sums.txt

      - name: Upload assets to GitHub Release
        if: steps.semantic.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.semantic.outputs.tag }}"
          gh release upload "$tag" \
            dist/nexus-linux-amd64 \
            dist/nexus-linux-arm64 \
            dist/nexus-darwin-arm64 \
            dist/sha256sums.txt \
            --clobber

  build-macos-dmg:
    name: Build and publish macOS DMG
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: [self-hosted, macOS, ARM64, v2, tw]
    env:
      DEVELOPER_DIR: /Volumes/xcodes/Xcode_26.2.app
      GEM_HOME: ${{ github.workspace }}/.gem
      BUNDLE_PATH: ${{ github.workspace }}/.bundle/vendor
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/nexus/go.mod
          cache-dependency-path: packages/nexus/go.sum

      - name: Select compatible Ruby
        run: |
          set -euo pipefail
          if [ -x /opt/homebrew/opt/ruby@3.3/bin/ruby ]; then
            echo "/opt/homebrew/opt/ruby@3.3/bin" >> "$GITHUB_PATH"
          elif [ -x /opt/homebrew/opt/ruby@3.2/bin/ruby ]; then
            echo "/opt/homebrew/opt/ruby@3.2/bin" >> "$GITHUB_PATH"
          elif [ -x /opt/homebrew/opt/ruby@3.1/bin/ruby ]; then
            echo "/opt/homebrew/opt/ruby@3.1/bin" >> "$GITHUB_PATH"
          else
            echo "/usr/bin" >> "$GITHUB_PATH"
            echo "$HOME/.gem/bin" >> "$GITHUB_PATH"
          fi

      - name: Install Bundler
        run: |
          set -euo pipefail
          ruby --version
          gem install bundler -v 2.4.22 --user-install

      - name: Bundle install
        working-directory: packages/nexus-swift
        run: bundle _2.4.22_ install

      - name: Build nexus (darwin/arm64)
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ needs.release.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/nexus-darwin-arm64 \
            ./cmd/nexus

      - name: Build pty-host (darwin/arm64)
        working-directory: packages/nexus
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-s -w \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT} \
            -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Version=${{ needs.release.outputs.version }}"
          go build -trimpath -ldflags "$LDFLAGS" \
            -o ../../dist/pty-host-darwin-arm64 \
            ./cmd/pty-host

      - name: Build DMG
        working-directory: packages/nexus-swift
        run: bundle exec fastlane mac app_dmg build_number:${{ needs.release.outputs.version }}

      - name: Upload DMG to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          dmg_path=$(find packages/nexus-swift/dist -name "*.dmg" -maxdepth 1 | head -n 1)
          if [ -z "$dmg_path" ]; then
            echo "Error: No DMG file found"
            exit 1
          fi
          gh release upload "$tag" "$dmg_path" --clobber
