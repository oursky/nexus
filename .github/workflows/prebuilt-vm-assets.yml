name: Build Prebuilt VM Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to publish assets (e.g. prebuilt-vm-2026-04-25)'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go'
      - 'packages/nexus/cmd/nexus-guest-agent/**'
      - 'packages/nexus/internal/infra/runtime/libkrun/**'
      - '.github/workflows/prebuilt-vm-assets.yml'

permissions:
  contents: write
  packages: write

jobs:
  build-prebuilt-vm-assets:
    name: Build pre-baked libkrun VM assets (linux-amd64)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install host prerequisites
        run: scripts/ci/install-host-prereqs.sh

      - name: Build nexus binary (with libkrun embed)
        run: scripts/ci/build-nexus-libkrun.sh

      - name: Build baked VM assets
        run: scripts/ci/build-prebuilt-vm-assets.sh

      - name: Package VM assets
        run: scripts/ci/package-prebuilt-vm-assets.sh

      - name: Upload prebuilt VM artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-libkrun-vm-linux-amd64
          path: |
            prebuilt-libkrun-vm-linux-amd64.tar.gz
            prebuilt-libkrun-vm-linux-amd64.tar.gz.sha256
          retention-days: 14

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish prebuilt VM package to GHCR
        env:
          GHCR_REF: ghcr.io/${{ github.repository }}/nexus-prebuilt-vm:linux-amd64
        run: scripts/ci/publish-prebuilt-vm-ghcr.sh

      - name: Publish release assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          files: |
            prebuilt-libkrun-vm-linux-amd64.tar.gz
            prebuilt-libkrun-vm-linux-amd64.tar.gz.sha256
          generate_release_notes: true
