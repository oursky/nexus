name: Build Prebuilt VM Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to publish assets (e.g. prebuilt-vm-2026-04-25)'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'packages/nexus/cmd/nexus/rootless_bootstrap_linux.go'
      - 'packages/nexus/cmd/nexus-guest-agent/**'
      - 'packages/nexus/internal/infra/runtime/libkrun/**'
      - '.github/workflows/prebuilt-vm-assets.yml'

permissions:
  contents: write

jobs:
  build-prebuilt-vm-assets:
    name: Build pre-baked libkrun VM assets (linux-amd64)
    runs-on: [self-hosted, linux, x64, v1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install host prerequisites
        run: |
          set -euo pipefail
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20 update -qq
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=20 -o Acquire::https::Timeout=20 install -y squashfs-tools e2fsprogs rsync

      - name: Build embedded guest-agent binary
        working-directory: packages/nexus
        run: go generate ./cmd/nexus/

      - name: Build nexus binary (with libkrun embed)
        working-directory: packages/nexus
        env:
          SMOLVM_VERSION: v0.5.19
        run: |
          set -euo pipefail
          EMBED_DIR="$PWD/cmd/nexus"

          if [[ -f "$EMBED_DIR/nexus-libkrun-vm" ]]; then
            SMOLVM_TARBALL="smolvm-${SMOLVM_VERSION#v}-linux-x86_64.tar.gz"
            SMOLVM_URL="https://github.com/smol-machines/smolvm/releases/download/${SMOLVM_VERSION}/${SMOLVM_TARBALL}"
            LIBS_TMP="/tmp/smolvm-libs-${SMOLVM_VERSION}"

            if [[ ! -d "$LIBS_TMP" ]]; then
              curl -fsSL --retry 3 -o "/tmp/${SMOLVM_TARBALL}" "$SMOLVM_URL"
              mkdir -p "$LIBS_TMP"
              tar -xzf "/tmp/${SMOLVM_TARBALL}" --strip-components=2 -C "$LIBS_TMP" \
                "smolvm-${SMOLVM_VERSION#v}-linux-x86_64/lib"
            fi

            cp "$LIBS_TMP/libkrun.so.1" "$EMBED_DIR/libkrun-embed.so"
            LIBKRUNFW_REAL=$(find "$LIBS_TMP" -maxdepth 1 -name 'libkrunfw.so.*.*' | sort | tail -1)
            cp "$LIBKRUNFW_REAL" "$EMBED_DIR/libkrunfw-embed.so"
            BUILD_TAGS="-tags libkrun"
          else
            BUILD_TAGS=""
          fi

          # shellcheck disable=SC2086
          CGO_ENABLED=0 go build $BUILD_TAGS -o /tmp/nexus-bin ./cmd/nexus/
          rm -f "$EMBED_DIR/libkrun-embed.so" "$EMBED_DIR/libkrunfw-embed.so"

      - name: Build baked VM assets
        run: |
          set -euo pipefail
          SOCK=/tmp/nexus-prebuilt.sock
          DB=/tmp/nexus-prebuilt.db

          sudo NEXUS_LIBKRUN_BAKE_TIMEOUT=300s NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS=1 /tmp/nexus-bin daemon start \
            --db "$DB" --socket "$SOCK" --workdir-root /tmp/nexus-prebuilt-work &
          DPID=$!
          timeout 600 bash -c 'until [ -S "$0" ]; do sleep 2; done' "$SOCK" \
            || { echo "prebuild timed out after 600s"; kill $DPID; exit 1; }
          sudo /tmp/nexus-bin daemon stop --socket "$SOCK" 2>/dev/null \
            || kill $DPID 2>/dev/null || true
          wait $DPID 2>/dev/null || true

      - name: Package VM assets
        run: |
          set -euo pipefail
          OUT="prebuilt-libkrun-vm-linux-amd64.tar.gz"
          mkdir -p /tmp/prebuilt-vm
          sudo cp /root/.local/share/nexus/vm/vmlinux.bin /tmp/prebuilt-vm/vmlinux.bin
          sudo cp /root/.local/share/nexus/vm/rootfs.ext4 /tmp/prebuilt-vm/rootfs.ext4
          sudo cp /root/.local/state/nexus/rootfs-agent.sha256 /tmp/prebuilt-vm/rootfs-agent.sha256 || true
          if sudo test -f /root/.local/state/nexus/rootfs-baked-v5; then
            sudo cp /root/.local/state/nexus/rootfs-baked-v5 /tmp/prebuilt-vm/rootfs-baked-v5
          elif sudo test -f /root/.local/state/nexus/rootfs-baked-v4; then
            sudo cp /root/.local/state/nexus/rootfs-baked-v4 /tmp/prebuilt-vm/rootfs-baked-v5
          fi
          sudo chown -R "$USER":"$USER" /tmp/prebuilt-vm
          tar -C /tmp/prebuilt-vm -czf "$OUT" .
          sha256sum "$OUT" > "$OUT.sha256"

      - name: Upload prebuilt VM artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-libkrun-vm-linux-amd64
          path: |
            prebuilt-libkrun-vm-linux-amd64.tar.gz
            prebuilt-libkrun-vm-linux-amd64.tar.gz.sha256
          retention-days: 14

      - name: Publish release assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          files: |
            prebuilt-libkrun-vm-linux-amd64.tar.gz
            prebuilt-libkrun-vm-linux-amd64.tar.gz.sha256
          generate_release_notes: true
