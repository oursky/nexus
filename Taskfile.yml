version: "3"

dotenv: [".env.local"]

vars:
  REMOTE_HOST: '{{.REMOTE_HOST | default ""}}'
  REMOTE_BIN: '{{.REMOTE_BIN | default "~/.local/bin/nexus"}}'
  REMOTE_PORT: '{{.REMOTE_PORT | default "7777"}}'

tasks:
  # ── Setup ────────────────────────────────────────────────────────────────
  setup:
    desc: "Check prerequisites and install dependencies for all packages"
    cmds:
      - |
        fail=0

        # Go ≥1.21
        if ! command -v go >/dev/null 2>&1; then
          echo "✗ go not found (need ≥1.21)" && fail=1
        else
          go_ver=$(go version | grep -oE '[0-9]+\.[0-9]+' | head -1)
          go_major=$(echo "$go_ver" | cut -d. -f1)
          go_minor=$(echo "$go_ver" | cut -d. -f2)
          if [ "$go_major" -lt 1 ] || { [ "$go_major" -eq 1 ] && [ "$go_minor" -lt 21 ]; }; then
            echo "✗ go $go_ver found but ≥1.21 required" && fail=1
          else
            echo "✓ go $go_ver"
          fi
        fi

        # task (go-task)
        if ! command -v task >/dev/null 2>&1; then
          echo "✗ task (go-task) not found (install: https://taskfile.dev/installation)" && fail=1
        else
          echo "✓ task $(task --version 2>/dev/null | head -1)"
        fi

        [ "$fail" -eq 0 ] || { echo ""; echo "Fix the issues above, then re-run: task setup"; exit 1; }
      - echo ""
      - echo "Installing Go dependencies..."
      - task: setup:go
      - echo ""
      - echo "✓ Setup complete!"
      - echo ""
      - echo "Next steps:"
      - echo "  task build        — build all packages"
      - echo "  task test         — run the test suite"
      - echo "  task dev:daemon   — start the daemon with hot-reload"

  setup:go:
    desc: "Download Go module dependencies"
    dir: packages/nexus
    cmds:
      - go mod download

  # ── Dev ─────────────────────────────────────────────────────────────────
  dev:daemon:
    desc: "Hot-reload daemon with air"
    dir: packages/nexus
    cmds:
      - >-
        air
        --build.cmd "go build -o ./tmp/main ./cmd/daemon"
        --build.entrypoint "./tmp/main"
        --build.args_bin "--token dev-token --workspace-dir $(python3 -c 'import os,tempfile; print(os.path.join(tempfile.gettempdir(),\"nexus-dev-workspace\"))')"

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    desc: Build core packages
    cmds:
      - task: build:workspace-daemon

  build:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go build ./...

  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    desc: Run core tests
    cmds:
      - task: test:workspace-daemon

  test:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./...

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    desc: Run core lint checks
    cmds:
      - task: lint:workspace-daemon

  lint:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./... -run TestDoesNotExist

  # ── CI ───────────────────────────────────────────────────────────────────
  ci:
    desc: Run local equivalent of CI jobs
    cmds:
      - task: ci:go-fix
      - task: ci:coverage
      - task: ci:core

  ci:core:
    desc: Run Core CI (linux) equivalent
    cmds:
      - ./scripts/ci/nexus-core.sh

  ci:go-fix:
    desc: Run Go Fix Check equivalent
    cmds:
      - ./scripts/ci/go-fix.sh

  ci:coverage:
    desc: Run Go Coverage (nexus) equivalent
    cmds:
      - ./scripts/ci/coverage.sh

  # ── Remote ───────────────────────────────────────────────────────────────
  # Set REMOTE_HOST=user@hostname in .env.local (see .env.local.example).
  # Override per-run: task deploy:remote REMOTE_HOST=user@host
  # Shell logic lives in scripts/remote/ — Taskfile is the entrypoint only.
  deploy:remote:
    desc: "Cross-compile nexus single binary for linux/amd64 and deploy to remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    env:
      REMOTE_HOST: "{{.REMOTE_HOST}}"
      REMOTE_BIN: "{{.REMOTE_BIN}}"
    cmds:
      - scripts/remote/deploy.sh

  daemon:restart:
    desc: "Restart the nexus daemon on the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    env:
      REMOTE_HOST: "{{.REMOTE_HOST}}"
      REMOTE_BIN: "{{.REMOTE_BIN}}"
      REMOTE_PORT: "{{.REMOTE_PORT}}"
    cmds:
      - scripts/remote/daemon-restart.sh

  daemon:token:
    desc: "Print the daemon token from the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    env:
      REMOTE_HOST: "{{.REMOTE_HOST}}"
      REMOTE_BIN: "{{.REMOTE_BIN}}"
    cmds:
      - scripts/remote/daemon-token.sh

  daemon:logs:
    desc: "Tail the daemon log on the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    env:
      REMOTE_HOST: "{{.REMOTE_HOST}}"
    cmds:
      - scripts/remote/daemon-logs.sh

  daemon:status:
    desc: "Check daemon status on the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    env:
      REMOTE_HOST: "{{.REMOTE_HOST}}"
      REMOTE_BIN: "{{.REMOTE_BIN}}"
      REMOTE_PORT: "{{.REMOTE_PORT}}"
    cmds:
      - scripts/remote/daemon-status.sh

  # ── Swift ────────────────────────────────────────────────────────────────
  swift:test:ui:
    desc: "Run NexusUITests XCUITest suite against the remote daemon (SSH tunnel auto-managed)"
    cmds:
      - scripts/test-xcui.sh {{.CLI_ARGS}}

  # ── Clean ─────────────────────────────────────────────────────────────────
  clean:
    desc: Clean core build artifacts
    cmds:
      - rm -rf packages/nexus/nexus
      - rm -rf packages/nexus/.air-tmp
