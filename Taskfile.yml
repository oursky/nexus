version: "3"

dotenv: [".env.local"]

env:
  GOTOOLCHAIN: "go1.25.0+auto"

vars:
  LOCAL_BIN:           '{{.LOCAL_BIN           | default "~/.local/bin/nexus-dev"}}'
  LOCAL_PORT:          '{{.LOCAL_PORT          | default "7778"}}'
  LOCAL_XDG_STATE_HOME: '{{.LOCAL_XDG_STATE_HOME | default "~/.local/state-dev"}}'
  LOCAL_WORKDIR_ROOT:  '{{.LOCAL_WORKDIR_ROOT  | default "/data/nexus/nexus-dev"}}'
  MAC_HOST:            '{{.MAC_HOST            | default ""}}'
  MAC_REPO_ROOT:       '{{.MAC_REPO_ROOT       | default "~/magic/nexus"}}'

tasks:
  # ── Setup ────────────────────────────────────────────────────────────────
  setup:
    desc: "Check prerequisites and install Go dependencies"
    cmds:
      - |
        fail=0

        if ! command -v go >/dev/null 2>&1; then
          echo "✗ go not found (need ≥1.21)" && fail=1
        else
          go_ver=$(go version | grep -oE '[0-9]+\.[0-9]+' | head -1)
          go_major=$(echo "$go_ver" | cut -d. -f1)
          go_minor=$(echo "$go_ver" | cut -d. -f2)
          if [ "$go_major" -lt 1 ] || { [ "$go_major" -eq 1 ] && [ "$go_minor" -lt 21 ]; }; then
            echo "✗ go $go_ver found but ≥1.21 required" && fail=1
          else
            echo "✓ go $go_ver"
          fi
        fi

        if ! command -v task >/dev/null 2>&1; then
          echo "✗ task not found — install: https://taskfile.dev/installation" && fail=1
        else
          echo "✓ task $(task --version 2>/dev/null | head -1)"
        fi

        [ "$fail" -eq 0 ] || { echo ""; echo "Fix the issues above then re-run: task setup"; exit 1; }
      - cd packages/nexus && go mod download
      - 'echo "Setup complete. Next: task dev:swift"'

  # ── Checks ───────────────────────────────────────────────────────────────
  build:
    desc: "Compile all Go packages"
    dir: packages/nexus
    cmds:
      - |
        if [ "$(go env GOOS)" = linux ] && [ "$(go env GOARCH)" = amd64 ]; then
          bash ../../scripts/ci/stage-nexus-linux-embeds.sh
        fi
      - go build ./...

  test:
    desc: "Run Go tests"
    dir: packages/nexus
    cmds:
      - |
        if [ "$(go env GOOS)" = linux ] && [ "$(go env GOARCH)" = amd64 ]; then
          bash ../../scripts/ci/stage-nexus-linux-embeds.sh
        fi
      - go test ./...

  lint:
    desc: "Run golangci-lint"
    dir: packages/nexus
    cmds:
      - go generate ./cmd/nexus/
      - golangci-lint run ./...

  format:
    desc: "Format Go code (gofmt + goimports)"
    dir: packages/nexus
    cmds:
      - gofmt -w .
      - goimports -w .

  check:spec-coverage:
    desc: "Generate formal verification coverage map and fail on unwaived missing proof IDs"
    dir: packages/nexus
    cmds:
      - go run ./test/e2e/coverage --check

  test:e2e:standalone:lima:
    desc: "Run self-contained standalone artifact proof in Lima"
    cmds:
      - ./scripts/e2e-standalone-lima.sh

  test:e2e:cli:lima:
    desc: "Run Go e2e CLI package in Lima with preflight"
    cmds:
      - ./scripts/e2e/cli-lima-test.sh

  test:e2e:cli:lima:preflight:
    desc: "Run Lima preflight checks for CLI e2e"
    cmds:
      - ./scripts/e2e/cli-lima-preflight.sh

  test:e2e:local:
    desc: "Run full e2e suite locally on Linux (SSH bootstrap + host config fixtures + sudo)"
    env:
      E2E_P: "{{.E2E_P | default \"2\"}}"
      E2E_PARALLEL: "{{.E2E_PARALLEL | default \"2\"}}"
      E2E_TIMEOUT: "{{.E2E_TIMEOUT | default \"60m\"}}"
      E2E_RUN: "{{.E2E_RUN | default \"\"}}"
      E2E_PKG: "{{.E2E_PKG | default \"...\"}}"
      SKIP_FIXTURES: "{{.SKIP_FIXTURES | default \"0\"}}"
      SKIP_BOOTSTRAP: "{{.SKIP_BOOTSTRAP | default \"0\"}}"
    cmds:
      - ./scripts/local/e2e-local.sh

  ci:libkrun:prep:
    desc: "Prepare libkrun VM assets for CI/e2e (host prereqs, build nexus, provision, prewarm)"
    cmds:
      - ./scripts/ci/install-host-prereqs.sh
      - ./scripts/ci/build-nexus-libkrun.sh
      - ./scripts/ci/provision-libkrun-host.sh
      - ./scripts/ci/prewarm-default-profile.sh

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -rf packages/nexus/nexus packages/nexus/tmp packages/nexus/.air-tmp

  # ── Dev loops ─────────────────────────────────────────────────────────────
  # Canonical flow is Linux-first: develop on linuxbox, build Mac app via SSH.
  # Set MAC_HOST in .env.local for Mac app builds.

  dev:cli:
    desc: "Build and install local CLI binary to ~/.local/bin/nexus-dev"
    env:
      LOCAL_BIN:   "{{.LOCAL_BIN}}"
    cmds:
      - scripts/local/deploy.sh

  dev:local:
    desc: "Build locally and restart the dev daemon on this Linux host"
    env:
      LOCAL_BIN:   "{{.LOCAL_BIN}}"
      LOCAL_PORT:  "{{.LOCAL_PORT}}"
      LOCAL_XDG_STATE_HOME: "{{.LOCAL_XDG_STATE_HOME}}"
      LOCAL_WORKDIR_ROOT: "{{.LOCAL_WORKDIR_ROOT}}"
    cmds:
      - scripts/local/deploy.sh
      - scripts/local/daemon-restart.sh

  kernel:build:arm64:
    desc: "Build arm64 Image kernel locally (requires aarch64 host or cross-compiler)"
    cmds:
      - scripts/nexus/build-kernel.sh --arch arm64 packages/nexus/cmd/nexus/assets/Image

  kernel:build:x86_64:
    desc: "Build x86_64 vmlinux kernel locally (requires x86_64 host or cross-compiler)"
    cmds:
      - scripts/nexus/build-kernel.sh --arch x86_64 packages/nexus/cmd/nexus/assets/vmlinux

  kernel:commit:
    desc: "Commit rebuilt kernels to the repo"
    cmds:
      - |
        git add packages/nexus/cmd/nexus/assets/vmlinux packages/nexus/cmd/nexus/assets/Image
        git diff --cached --quiet && { echo "No kernel changes to commit"; exit 0; }
        git commit -m "chore(kernel): rebuild kernels $(date +%Y-%m-%d)"

  dev:swift:
    desc: "Linux-first full dev loop: build CLI locally, restart daemon, stage resources, sync to Mac, build + open NexusApp"
    preconditions:
      - sh: '[ -n "{{.MAC_HOST}}" ]'
        msg: "MAC_HOST is not set. Add MAC_HOST=user@mac-hostname to .env.local"
    env:
      MAC_HOST: "{{.MAC_HOST}}"
      MAC_REPO_ROOT: "{{.MAC_REPO_ROOT}}"
      LOCAL_BIN:   "{{.LOCAL_BIN}}"
      LOCAL_PORT:  "{{.LOCAL_PORT}}"
      LOCAL_XDG_STATE_HOME: "{{.LOCAL_XDG_STATE_HOME}}"
    cmds:
      - task: dev:local
      - task: stage:nexus-macos
      - task: stage:nexus-linux
      - scripts/generate-sdk.sh
      - scripts/remote/mac-build-app.sh

  # ── Dogfooding (develop on Linux remote) ──────────────────────────────────
  # Set MAC_HOST=user@mac-hostname in .env.local on the Linux remote.

  dev:mac:build:
    desc: "SSH from Linux remote back to Mac to build NexusApp"
    preconditions:
      - sh: '[ -n "{{.MAC_HOST}}" ]'
        msg: "MAC_HOST is not set. Add it to .env.local on the remote with MAC_HOST=user@mac-host."
    env:
      MAC_HOST: "{{.MAC_HOST}}"
      MAC_REPO_ROOT: "{{.MAC_REPO_ROOT}}"
    cmds:
      - scripts/remote/mac-build-app.sh

  dev:mac:test-headless:
    desc: "SSH from Linux remote back to Mac to start NexusApp headless RPC and verify connection"
    preconditions:
      - sh: '[ -n "{{.MAC_HOST}}" ]'
        msg: "MAC_HOST is not set. Add it to .env.local on the remote with MAC_HOST=user@mac-host."
    env:
      MAC_HOST: "{{.MAC_HOST}}"
      MAC_REPO_ROOT: "{{.MAC_REPO_ROOT}}"
    cmds:
      - scripts/remote/mac-test-headless.sh

  stage:nexus-macos:
    desc: "Build macOS arm64 nexus CLI and stage to packages/nexus-swift/Resources/nexus"
    cmds:
      - task: build:libkrun-darwin
      - |
        BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo dev)"
        LDFLAGS="-X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Time=${BUILD_TIME} \
                 -X github.com/oursky/nexus/packages/nexus/internal/buildinfo.Commit=${GIT_COMMIT}"
        echo "Staging nexus (darwin/arm64) → packages/nexus-swift/Resources/nexus (commit=${GIT_COMMIT} built=${BUILD_TIME})..."
        GOOS=darwin GOARCH=arm64 go build \
          -C packages/nexus \
          -tags dev \
          -ldflags "$LDFLAGS" \
          -o ../../packages/nexus-swift/Resources/nexus \
          ./cmd/nexus
        chmod +x packages/nexus-swift/Resources/nexus
        if [ "$(uname -s)" = "Darwin" ] && [ -f packages/nexus/nexus.entitlements ]; then
          codesign --sign - --force --entitlements packages/nexus/nexus.entitlements packages/nexus-swift/Resources/nexus 2>/dev/null && \
            echo "✓ Codesigned with hypervisor entitlements" || \
            echo "Warning: codesign failed"
        fi
        echo "✓ Staged $(ls -lh packages/nexus-swift/Resources/nexus | awk '{print $5}')"

  build:libkrun-darwin:
    desc: "Download smolvm darwin-arm64 and stage libkrun dylibs for embedding"
    cmds:
      - scripts/local/build-libkrun-darwin.sh

  stage:libkrun-macos:
    desc: "Stage libkrun.dylib + libkrunfw.dylib from Homebrew into Swift Resources"
    cmds:
      - scripts/local/stage-libkrun-macos.sh

  stage:nexus-linux:
    desc: "Build linux/amd64 nexus daemon and stage to packages/nexus-swift/Resources/nexus-linux-amd64 (bundled for remote provisioning)"
    cmds:
      - scripts/swift/stage-linux-nexus.sh amd64

  # ── Maintenance ───────────────────────────────────────────────────────────
  generate:sdk:
    desc: "Regenerate NexusRPC.swift from Go RPC types"
    cmds:
      - scripts/generate-sdk.sh

  release:publish:
    desc: "Tag and push a new release to trigger the GitHub Actions release workflow"
    vars:
      VERSION: '{{.VERSION | default ""}}'
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required. Usage: task release:publish VERSION=v1.2.3"
      - sh: 'echo "{{.VERSION}}" | grep -qE "^v[0-9]+\.[0-9]+\.[0-9]"'
        msg: "VERSION must be a semver tag like v1.2.3 or v1.2.3-rc1"
    cmds:
      - git tag -a "{{.VERSION}}" -m "Release {{.VERSION}}"
      - git push origin "{{.VERSION}}"
      - 'echo "Tagged and pushed {{.VERSION}} — GitHub Actions will build and publish the release assets."'

  # ── Multi-daemon (multiple isolated nexus instances on this Linux host) ───────
  # Set MAC_HOST=newman@minion in .env.local to SSH back to the Mac for builds.
  # Each named daemon gets its own port, state dir, and data dir.

  dev:daemon:start:
    desc: "Start a named nexus daemon instance (NAME required, auto-assigns port)"
    vars:
      NAME: '{{.NAME | default ""}}'
      PORT: '{{.PORT | default ""}}'
      DRIVER: '{{.DRIVER | default "sandbox"}}'
    preconditions:
      - sh: '[ -n "{{.NAME}}" ]'
        msg: "NAME is required. Usage: task dev:daemon:start NAME=myinstance [PORT=7780] [DRIVER=sandbox]"
    env:
      LOCAL_BIN: "{{.LOCAL_BIN}}"
      BASE_PORT: '{{if .PORT}}{{.PORT}}{{else}}7780{{end}}'
    cmds:
      - |
        ARGS="{{.NAME}}"
        {{if .PORT}}ARGS="$ARGS --port {{.PORT}}"{{end}}
        ARGS="$ARGS --driver {{.DRIVER}}"
        scripts/local/daemon-named.sh start $ARGS

  dev:daemon:stop:
    desc: "Stop a named nexus daemon instance"
    vars:
      NAME: '{{.NAME | default ""}}'
    preconditions:
      - sh: '[ -n "{{.NAME}}" ]'
        msg: "NAME is required. Usage: task dev:daemon:stop NAME=myinstance"
    env:
      LOCAL_BIN: "{{.LOCAL_BIN}}"
    cmds:
      - scripts/local/daemon-named.sh stop {{.NAME}}

  dev:daemon:list:
    desc: "List all named nexus daemon instances and their status"
    env:
      LOCAL_BIN: "{{.LOCAL_BIN}}"
    cmds:
      - scripts/local/daemon-named.sh list

  dev:workspace:sync:
    desc: "Sync a workspace directory to the Mac (volume sync)"
    vars:
      WORKSPACE_PATH: '{{.WORKSPACE_PATH | default ""}}'
      WATCH: '{{.WATCH | default "false"}}'
    preconditions:
      - sh: '[ -n "{{.MAC_HOST}}" ]'
        msg: "MAC_HOST is not set. Add MAC_HOST=user@mac-hostname to .env.local"
      - sh: '[ -n "{{.WORKSPACE_PATH}}" ]'
        msg: "WORKSPACE_PATH is required. Usage: task dev:workspace:sync WORKSPACE_PATH=/path/to/workspace [WATCH=true]"
    env:
      MAC_HOST: "{{.MAC_HOST}}"
      MAC_TARGET_PATH: "{{.MAC_REPO_ROOT}}"
      WORKSPACE_PATH: "{{.WORKSPACE_PATH}}"
    cmds:
      - |
        if [ "{{.WATCH}}" = "true" ]; then
          scripts/workspace-sync.sh --watch
        else
          scripts/workspace-sync.sh
        fi

  # ── CI mirrors (local equivalents of GitHub Actions) ─────────────────────
  generate:agent:
    desc: "Build embedded guest-agent binary (go generate)"
    dir: packages/nexus
    cmds:
      - go generate ./cmd/nexus/
    status:
      - test -f cmd/nexus/embed_agent_linux_amd64.go

  ci:lint:
    desc: "Run full CI lint pipeline (go-fix + golangci-lint)"
    cmds:
      - ./scripts/ci/go-fix.sh
      - task: lint

  ci:test:
    desc: "Run CI test pipeline (generate + test without coverage)"
    cmds:
      - task: generate:agent
      - cd packages/nexus && go test -count=1 ./...

  ci:build:
    desc: "Run CI build pipeline (generate + build + cross-platform)"
    cmds:
      - task: generate:agent
      - task: build
      - task: stage:nexus-macos

  ci:commits:
    desc: "Validate commit messages match conventional commit format"
    cmds:
      - ./scripts/ci/check-commits.sh

  ci:local:
    desc: "Run all local CI checks (commits + lint + test + build)"
    cmds:
      - task: ci:commits
      - task: ci:lint
      - task: ci:test
      - task: ci:build

  ci:
    desc: "Alias for ci:local — run all local CI checks"
    cmds:
      - task: ci:local

  ci:core:
    desc: "CI core: build + vet + e2e-short (requires local nexus daemon)"
    cmds:
      - ./scripts/ci/nexus-core.sh

  ci:spec:
    desc: "CI spec-coverage: formal verification coverage map"
    cmds:
      - task: check:spec-coverage

  ci:passt:build:
    desc: "Build patched passt binary for CI"
    cmds:
      - scripts/ci/build-passt.sh

  ci:e2e:prep:
    desc: "Prepare environment for e2e tests in CI"
    cmds:
      - ./scripts/ci/enable-kvm.sh
      - ./scripts/ci/install-host-prereqs.sh
      - ./scripts/ci/setup-xfs-reflink.sh
      - ./scripts/ci/prepare-libkrun-cache-env.sh
      - ./scripts/ci/build-nexus-libkrun.sh
      - ./scripts/ci/provision-libkrun-host.sh
      - ./scripts/ci/setup-host-config-fixtures.sh

  ci:e2e:run:
    desc: "Run e2e tests in CI"
    vars:
      E2E_TIMEOUT: '{{.E2E_TIMEOUT | default "60m"}}'
      E2E_P: '{{.E2E_P | default "2"}}'
      E2E_PARALLEL: '{{.E2E_PARALLEL | default "2"}}'
      E2E_RUN: '{{.E2E_RUN | default ""}}'
      E2E_PKG: '{{.E2E_PKG | default "./test/e2e/..."}}'
    env:
      CI: "true"
      NEXUS_LIBKRUN_SKIP_BAKE: "1"
      NEXUS_LIBKRUN_BAKE_TIMEOUT: "120s"
      NEXUS_LIBKRUN_BAKE_MAX_ATTEMPTS: "1"
      NEXUS_VM_KERNEL: "/var/lib/nexus/vmlinux.bin"
      NEXUS_VM_ROOTFS: "/var/lib/nexus/rootfs.ext4"
      NEXUS_WORKSPACE_IMAGE_MIN_MIB: "512"
      NEXUS_RUNNER_ROOTFS_MIN_MIB: "512"
      NEXUS_LIBKRUN_MEM_MIB: "256"
      NEXUS_PASST_PATH: "/tmp/passt-patched"
    cmds:
      - |
        RUN_FLAG=""
        if [ -n "{{.E2E_RUN}}" ]; then
          RUN_FLAG="-run {{.E2E_RUN}}"
        fi
        go test -tags e2e -count=1 -timeout={{.E2E_TIMEOUT}} -v -p {{.E2E_P}} -parallel {{.E2E_PARALLEL}} $RUN_FLAG {{.E2E_PKG}}

  showcase:rerecord:
    desc: "Re-record showcase flow by controlling NexusApp through headless RPC, then render remotion"
    cmds:
      - pnpm --dir packages/showcase run rerecord
