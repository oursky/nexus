version: "3"

dotenv: [".env.local"]

vars:
  REMOTE_HOST: '{{.REMOTE_HOST | default ""}}'
  REMOTE_DAEMON_BIN: '{{.REMOTE_DAEMON_BIN | default "/usr/local/bin/nexus-daemon"}}'
  REMOTE_CLI_BIN: '{{.REMOTE_CLI_BIN | default "/usr/local/bin/nexus"}}'
  REMOTE_PORT: '{{.REMOTE_PORT | default "7777"}}'

tasks:
  # ── Dev ─────────────────────────────────────────────────────────────────
  dev:
    desc: "Start daemon (air hot-reload) + Vite dev server concurrently"
    deps: [dev:workspace-dir]
    cmds:
      - task --parallel dev:daemon dev:ui

  dev:daemon:
    desc: "Hot-reload daemon with air (proxies /ui to Vite on :5173)"
    dir: packages/nexus
    cmds:
      - >-
        air
        --build.cmd "go build -o ./tmp/main ./cmd/daemon"
        --build.entrypoint "./tmp/main"
        --build.args_bin "--token dev-token --workspace-dir $(python3 -c 'import os,tempfile; print(os.path.join(tempfile.gettempdir(),"nexus-dev-workspace"))')"
    env:
      NEXUS_DEV_UI: "http://localhost:5173"

  dev:ui:
    desc: "Vite dev server for the admin UI"
    dir: packages/nexus-ui
    cmds:
      - pnpm install
      - pnpm dev

  dev:workspace-dir:
    desc: "Ensure dev workspace dir exists"
    cmds:
      - mkdir -p /tmp/nexus-dev-workspace
    silent: true

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    desc: Build core packages
    cmds:
      - task: build:workspace-daemon
      - task: build:workspace-sdk
      - task: build:nexus-ui

  build:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go build ./...

  build:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm install
      - pnpm build

  build:nexus-ui:
    desc: "Build UI and copy clean dist into Go embed directory"
    dir: packages/nexus-ui
    cmds:
      - pnpm install
      - pnpm build
      - bash -c 'rm -rf ../nexus/pkg/server/portal/ui_dist && mkdir -p ../nexus/pkg/server/portal/ui_dist && cp -r dist/. ../nexus/pkg/server/portal/ui_dist/'

  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    desc: Run core tests
    cmds:
      - task: test:workspace-daemon
      - task: test:workspace-sdk
      - task: test:nexus-ui

  test:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./...

  test:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm test

  test:nexus-ui:
    dir: packages/nexus-ui
    cmds:
      - pnpm check

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    desc: Run core lint checks
    cmds:
      - task: lint:workspace-daemon
      - task: lint:workspace-sdk

  lint:workspace-daemon:
    dir: packages/nexus
    cmds:
      - go test ./... -run TestDoesNotExist

  lint:workspace-sdk:
    dir: packages/sdk/js
    cmds:
      - pnpm exec tsc --noEmit

  # ── CI ───────────────────────────────────────────────────────────────────
  ci:
    desc: Run local equivalent of CI jobs
    cmds:
      - task: ci:go-fix
      - task: ci:coverage
      - task: ci:core
      - task: ci:sdk-runtime-e2e

  ci:core:
    desc: Run Core CI (linux) equivalent
    cmds:
      - ./scripts/ci/nexus-core.sh

  ci:go-fix:
    desc: Run Go Fix Check equivalent
    cmds:
      - ./scripts/ci/go-fix.sh

  ci:coverage:
    desc: Run Go Coverage (nexus) equivalent
    cmds:
      - ./scripts/ci/coverage.sh

  ci:sdk-runtime-e2e:
    desc: Run runtime backend selection E2E package (strict when CI=true; set NEXUS_E2E_STRICT_RUNTIME=0 to allow soft skips locally)
    env:
      CI: true
    cmds:
      - bash -lc 'set -euo pipefail; if [[ -e /dev/kvm ]]; then sudo chmod 666 /dev/kvm || true; fi'
      - ./scripts/ci/sdk-runtime-e2e-setup.sh
      - bash -lc 'set -euo pipefail; set -a; source "$(git rev-parse --show-toplevel)/.nexus-e2e-env.sh"; set +a; pnpm --filter @nexus/e2e-sdk-runtime test:ci -- src/cases/runtime-selection.e2e.test.ts'

  # ── Remote ───────────────────────────────────────────────────────────────
  # Set REMOTE_HOST=user@hostname in .env.local (see .env.local.example).
  # Override per-run: task deploy:remote REMOTE_HOST=user@host
  deploy:remote:
    desc: "Cross-compile nexus daemon and CLI for linux/amd64 and deploy to remote host"
    dir: packages/nexus
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    cmds:
      - echo "Building nexus daemon for linux/amd64..."
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ./tmp/nexus-linux ./cmd/daemon
      - echo "Building nexus CLI for linux/amd64..."
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ./tmp/nexus-cli-linux ./cmd/nexus
      - echo "Deploying daemon to {{.REMOTE_HOST}}:{{.REMOTE_DAEMON_BIN}}..."
      - scp ./tmp/nexus-linux {{.REMOTE_HOST}}:{{.REMOTE_DAEMON_BIN}}
      - ssh {{.REMOTE_HOST}} "chmod +x {{.REMOTE_DAEMON_BIN}}"
      - echo "Deploying CLI to {{.REMOTE_HOST}}:{{.REMOTE_CLI_BIN}}..."
      - ssh {{.REMOTE_HOST}} "mkdir -p $(dirname {{.REMOTE_CLI_BIN}})"
      - scp ./tmp/nexus-cli-linux {{.REMOTE_HOST}}:{{.REMOTE_CLI_BIN}}
      - ssh {{.REMOTE_HOST}} "chmod +x {{.REMOTE_CLI_BIN}}"
      - echo "Deployed daemon and CLI successfully."

  daemon:restart:
    desc: "Restart the nexus daemon on the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    cmds:
      - |
        ssh {{.REMOTE_HOST}} 'bash -s' << 'ENDSSH'
        pkill -f 'nexus daemon start' || true
        sleep 1
        rm -f ~/.config/nexus/run/token
        nohup {{.REMOTE_CLI_BIN}} daemon start --network --bind 127.0.0.1 --port {{.REMOTE_PORT}} > /tmp/nexus-daemon.log 2>&1 &
        sleep 5
        curl -sf http://127.0.0.1:{{.REMOTE_PORT}}/healthz && echo ' ✓ daemon healthy' || echo ' ✗ daemon not healthy'
        ENDSSH

  daemon:token:
    desc: "Print the daemon token from the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    cmds:
      - ssh {{.REMOTE_HOST}} "{{.REMOTE_CLI_BIN}} daemon token"

  daemon:logs:
    desc: "Tail the daemon log on the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    cmds:
      - ssh {{.REMOTE_HOST}} "tail -100 /tmp/nexus-daemon.log"

  daemon:status:
    desc: "Check daemon status on the remote host"
    preconditions:
      - sh: '[ -n "{{.REMOTE_HOST}}" ]'
        msg: "REMOTE_HOST is not set. Create .env.local with REMOTE_HOST=user@hostname or pass it on the CLI."
    cmds:
      - ssh {{.REMOTE_HOST}} "{{.REMOTE_CLI_BIN}} daemon status 2>&1; echo '---'; curl -sf http://127.0.0.1:{{.REMOTE_PORT}}/healthz && echo ' (healthy)' || echo ' (unreachable)'"

  # ── Clean ─────────────────────────────────────────────────────────────────
  clean:
    desc: Clean core build artifacts
    cmds:
      - rm -rf packages/nexus/nexus
      - rm -rf packages/nexus/.air-tmp
      - rm -rf packages/sdk/js/dist
      - rm -rf packages/nexus-ui/dist
      - rm -rf packages/nexus/pkg/server/portal/ui_dist
