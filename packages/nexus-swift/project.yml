name: NexusApp

options:
  bundleIdPrefix: com.oursky
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: strict
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES
    # Allow callers (CI/local scripts) to override app bundle IDs.
    NEXUS_APP_BUNDLE_ID: com.oursky.nexus.local
    NEXUS_APP_TEST_BUNDLE_ID: com.oursky.nexus.local.tests
    MTL_ENABLE_DEBUG_INFO: NO
    # Skip Metal shader compilation (not used in this app)
    GCC_WARN_INHIBIT_ALL_WARNINGS: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: FEATURE_EXPORT_IMPORT

targets:

  # ── NexusCore static library ──────────────────────────────────────────────
  NexusCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/NexusCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusCore

  # ── NexusApp application ─────────────────────────────────────────────────
  NexusApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/NexusApp
    postCompileScripts:
      - name: Copy bundled tools to app Resources
        inputFiles:
          - $(SRCROOT)/Resources/nexus
          - $(SRCROOT)/Resources/nexus-linux-amd64
          - $(SRCROOT)/Resources/nexus-linux-arm64
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-linux-amd64
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-linux-arm64
        script: |
          copy_tool() {
            local src="$1"
            local dst="$2"
            local label="$3"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
              chmod +x "$dst"
              echo "Bundled ${label} -> ${dst}"
            else
              echo "warning: ${label} not found at ${src}; run 'go build -o packages/nexus-swift/Resources/nexus ./packages/nexus/cmd/nexus'"
            fi
          }

          # macOS nexus CLI — used by the app for workspace open-editor and daemon operations.
          copy_tool "${SRCROOT}/Resources/nexus" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/nexus" "nexus"

          # Linux nexus binaries for remote provisioning (uploading to fresh Linux hosts).
          for arch in amd64 arm64; do
            copy_tool "${SRCROOT}/Resources/nexus-linux-${arch}" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/nexus-linux-${arch}" "nexus-linux-${arch}"
          done
      - name: Sign bundled macOS CLI (App Store)
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus
        outputFiles:
          # Stamp only: Xcode rejects the same path as both input and output (mutable output).
          - $(DERIVED_FILE_DIR)/nexus-sign-bundled-cli.stamp
        script: |
          # Every Mach-O executable in the .app must declare App Sandbox for Mac App Store.
          # Copied CLIs are ad-hoc signed or unsigned; re-sign with the app entitlements.
          RES="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources"
          ENT="${SRCROOT}/Sources/NexusApp/NexusApp.entitlements"
          sign_macho() {
            local bin="$1"
            [ -f "$bin" ] || return 0
            case "$(file -b "$bin")" in
              Mach-O*) ;;
              *) echo "Sign bundled CLI: skip non-Mach-O $(basename "$bin")"; return 0 ;;
            esac
            if [ -z "${EXPANDED_CODE_SIGN_IDENTITY:-}" ] || [ "${EXPANDED_CODE_SIGN_IDENTITY}" = "-" ]; then
              echo "Sign bundled CLI: skip (no EXPANDED_CODE_SIGN_IDENTITY): $bin"
              return 0
            fi
            codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" \
              --entitlements "${ENT}" \
              --timestamp \
              --options runtime \
              "$bin"
            echo "Sign bundled CLI: ok $(basename "$bin")"
          }
          sign_macho "${RES}/nexus"
          sign_macho "${RES}/nexus-daemon"
          if [ -d "${RES}/tools" ]; then
            for bin in "${RES}/tools/"*; do
              [ -f "$bin" ] || continue
              [ -x "$bin" ] || continue
              sign_macho "$bin"
            done
          fi
          mkdir -p "${DERIVED_FILE_DIR}"
          touch "${DERIVED_FILE_DIR}/nexus-sign-bundled-cli.stamp"
    dependencies:
      - target: NexusCore
        link: true
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: Sources/NexusApp/Info.plist
      properties:
        CFBundleDisplayName: Nexus
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_APP_BUNDLE_ID)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/NexusApp/NexusApp.entitlements

  # ── NexusAppTests (unit / integration) ───────────────────────────────────
  NexusAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NexusAppTests
    dependencies:
      - target: NexusCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_APP_TEST_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NexusApp:
    build:
      targets:
        NexusCore: all
        NexusApp: all
    run:
      config: Debug
      launchAutomaticallySubstyle: 2
    test:
      config: Debug
      targets:
        - name: NexusAppTests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
