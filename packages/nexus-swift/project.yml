name: NexusApp

options:
  bundleIdPrefix: com.oursky
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.8.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: strict
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES
    # Allow callers (CI/local scripts) to override app bundle IDs.
    NEXUS_APP_BUNDLE_ID: com.oursky.nexus.local
    NEXUS_APP_TEST_BUNDLE_ID: com.oursky.nexus.local.tests
    MTL_ENABLE_DEBUG_INFO: NO
    # Skip Metal shader compilation (not used in this app)
    GCC_WARN_INHIBIT_ALL_WARNINGS: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

targets:

  # ── NexusCore static library ──────────────────────────────────────────────
  NexusCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/NexusCore
    dependencies:
      - package: Citadel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nexus.NexusCore

  # ── NexusApp application ─────────────────────────────────────────────────
  NexusApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/NexusApp
    postCompileScripts:
      - name: Copy Linux nexus binaries for provisioning
        inputFiles:
          - $(SRCROOT)/Resources/nexus-linux-amd64
          - $(SRCROOT)/Resources/nexus-linux-arm64
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-linux-amd64
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-linux-arm64
        script: |
          set -euo pipefail
          for arch in amd64 arm64; do
            SRC="${SRCROOT}/Resources/nexus-linux-${arch}"
            DST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/nexus-linux-${arch}"
            if [ -f "$SRC" ]; then
              mkdir -p "$(dirname "$DST")"
              cp "$SRC" "$DST"
              chmod +x "$DST"
              echo "Bundled nexus-linux-${arch} -> ${DST}"
            else
              echo "warning: nexus-linux-${arch} not found at ${SRC}; run 'go build'"
            fi
          done
    dependencies:
      - target: NexusCore
        link: true
      - package: SwiftTerm
        product: SwiftTerm
    info:
      path: Sources/NexusApp/Info.plist
      properties:
        CFBundleDisplayName: Nexus
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
    settings:
      base:
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_APP_BUNDLE_ID)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/NexusApp/NexusApp.entitlements

  # ── NexusAppTests (unit / integration) ───────────────────────────────────
  NexusAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NexusAppTests
    postCompileScripts:
      - name: Copy Linux nexus binaries for provisioning
        inputFiles:
          - $(SRCROOT)/Resources/nexus-linux-amd64
          - $(SRCROOT)/Resources/nexus-linux-arm64
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-linux-amd64
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/nexus-linux-arm64
        script: |
          set -euo pipefail
          for arch in amd64 arm64; do
            SRC="${SRCROOT}/Resources/nexus-linux-${arch}"
            DST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/nexus-linux-${arch}"
            if [ -f "$SRC" ]; then
              mkdir -p "$(dirname "$DST")"
              cp "$SRC" "$DST"
              chmod +x "$DST"
              echo "Bundled nexus-linux-${arch} -> ${DST}"
            else
              echo "warning: nexus-linux-${arch} not found at ${SRC}; run 'go build'"
            fi
          done
    dependencies:
      - target: NexusCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEXUS_APP_TEST_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NexusApp:
    build:
      targets:
        NexusCore: all
        NexusApp: all
    run:
      config: Debug
      launchAutomaticallySubstyle: 2
    test:
      config: Debug
      targets:
        - name: NexusAppTests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
