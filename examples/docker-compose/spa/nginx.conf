server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:3000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
